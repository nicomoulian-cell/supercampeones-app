        </div>
        <div class="team-card-bottom">
          <span class="team-card-meta">${t.players ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> ${t.players} jug.` : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><circle cx="12" cy="12" r="10"/><path d="M12 7l3 2.2-1.15 3.5h-3.7L9 9.2 12 7z"/><path d="M12 2v5M20.5 8.5L15 9.8M18.5 19.5l-4-5.8M5.5 19.5l4-5.8M3.5 8.5L9 9.8"/></svg> Sin datos'}</span>
          <div class="team-card-actions">
            <button class="btn btn-secondary btn-xs btn-icon" onclick="openEditTeamModal('${t.id}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></button>
            ${!cat.fixtureGenerated && !hasGroups ? `<button class="btn btn-secondary btn-xs btn-icon" onclick="deleteTeam('${t.id}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></button>` : ''}
          </div>
        </div>
      </div>`;
    }).join('')}</div>`;
  const canGenerate = !hasGroups && teams.length >= 4 && teams.length % 4 === 0;
  const rightBtn = hasGroups
    ? `<button class="btn btn-secondary" onclick="navigate('grupos')" style="flex:1"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><path d="M3 3h7v7H3z"/><path d="M14 3h7v7h-7z"/><path d="M3 14h7v7H3z"/><path d="M14 14h7v7h-7z"/></svg> Ver Grupos</button>`
    : canGenerate
      ? `<button class="btn btn-secondary" onclick="navigate('grupos')" style="flex:1"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> Armar Grupos</button>`
      : '';
  const warningMsg = !hasGroups && !canGenerate && teams.length >= 4
    ? `<div class="alert alert-warning" style="margin-top:8px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Tienes ${teams.length} equipos. El número debe ser múltiplo de 4 para armar grupos.</div>`
    : '';
  const genBtn = `<div style="display:flex;gap:8px;margin-top:40px">
    <button class="btn btn-primary" style="flex:1" onclick="openAddTeamModal()">+ Agregar Equipo</button>
    ${rightBtn}
  </div>${warningMsg}`;
  return `
    
    ${fixtureStatus}
    <div class="section-header">
      <span class="section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> ${escHtml(cat.name)}</span>
      <div class="flex gap-8">
        <button class="btn btn-secondary btn-sm" onclick="openRenameCatModal('${cat.id}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></button>
        <button class="btn btn-danger btn-sm" onclick="deleteCategory('${cat.id}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></button>
      </div>
    </div>
    <p class="section-sub">${teams.length} equipo${teams.length !== 1 ? 's' : ''} inscrito${teams.length !== 1 ? 's' : ''}. Recomendado: 4, 8, 12, 16 o 20 equipos.</p>
    <div style="margin-top:12px">${teamList}</div>
    ${genBtn}
`;
}

/* ═══════════════════════ FIXTURE PAGE ═══════════════════════ */
function getMatchTime(startTime, roundIndex, matchIndexInRound) {
  if (!startTime) return null;
  const slotIndex = roundIndex * 2 + matchIndexInRound;
  const [h, m] = startTime.split(':').map(Number);
  const total = h * 60 + m + slotIndex * 30;
  return `${String(Math.floor(total/60)).padStart(2,'0')}:${String(total%60).padStart(2,'0')}`;
}

/* ═══════════════════════ GRUPOS PAGE ═══════════════════════ */
function renderGruposPage() {
  const _svgI = (d, s=15) => `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0">${d}</svg>`;
  const SVG_USERS  = _svgI(`<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>`);
  const SVG_COURT  = _svgI(`<rect x="2" y="4" width="20" height="16" rx="2"/><line x1="12" y1="4" x2="12" y2="20"/><path d="M9 12a3 3 0 0 0 6 0"/>`);
  const SVG_USERS_LG = _svgI(`<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>`, 48);
  const cat = getActiveCategory();
  if (!cat) return `<div class="empty-state"><div class="icon">${SVG_USERS_LG}</div><h3>Sin categoría</h3><p>Selecciona una categoría primero.</p></div>`;

  // Sin grupos: mostrar UI de asignación inline (antes era un modal)
  if (!cat.groups || cat.groups.length === 0) {
    const n = cat.teams.length;
    if (n < 4) return `<div class="empty-state"><div class="icon">${SVG_USERS_LG}</div><h3>Sin equipos suficientes</h3><p>Agrega al menos 4 equipos desde Equipos.</p><button class="btn btn-primary" style="margin-top:16px" onclick="navigate('equipos')">+ Agregar Equipo</button></div>`;
    if (n % 4 !== 0) return `<div class="empty-state"><div class="icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div><h3>Número de equipos incorrecto</h3><p>Tienes ${n} equipos. Necesitas un múltiplo de 4 (4, 8, 12, 16, 20...).</p><button class="btn btn-primary" style="margin-top:16px" onclick="navigate('equipos')">← Ir a Equipos</button></div>`;

    const numGroups = Math.floor(n / 4);
    const groupNames = Array.from({length: numGroups}, (_, i) => String(i + 1));
    if (!window._groupAssignments || Object.keys(window._groupAssignments).length !== n) {
      window._groupAssignments = {};
      cat.teams.forEach((t, i) => { window._groupAssignments[t.id] = groupNames[i % numGroups]; });
    }
    if (!window._fixtureConfig) window._fixtureConfig = { startTime: cat.fixtureConfig?.startTime || '8:30' };

    const groupMap = {};
    groupNames.forEach(g => groupMap[g] = []);
    Object.entries(window._groupAssignments).forEach(([tid, g]) => { if (groupMap[g]) groupMap[g].push(tid); });
    const canGenerate = groupNames.every(g => groupMap[g].length === 4);

    const teamRows = cat.teams.map(t => {
      const assigned = window._groupAssignments[t.id] || groupNames[0];
      const init = t.name.trim().split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
      return `<div class="team-item" style="margin-bottom:6px;--team-color:${t.color||'var(--green)'}">
        <div class="team-avatar" style="background:${t.color||'var(--green)'}">${init}</div>
        <div class="team-info">
          <div class="team-name-text">${escHtml(t.name)}</div>
          ${t.players ? `<span class="team-meta" style="display:inline-flex;align-items:center;gap:3px">${SVG_USERS} ${t.players}</span>` : ''}
        </div>
        <div style="padding-right:12px;flex-shrink:0">
          <select class="input" style="width:auto;min-width:90px;padding:6px 28px 6px 10px;font-size:13px;font-weight:700"
            onchange="assignTeamToGroup('${t.id}',this.value)">
            ${groupNames.map(g => `<option value="${g}" ${assigned===g?'selected':''}>Grupo ${g}</option>`).join('')}
          </select>
        </div>
      </div>`;
    }).join('');

    const groupPreview = groupNames.map(g => {
      const teams = groupMap[g].map(tid => { const t = cat.teams.find(x => x.id === tid); return t ? `<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:50%;background:${t.color};display:inline-block"></span>${escHtml(t.name)}</span>` : ''; }).join(' · ');
      const count = groupMap[g].length;
      const ok = count === 4;
      return `<div style="display:flex;align-items:baseline;gap:8px;padding:8px 10px;border-radius:8px;margin-bottom:6px;background:${ok?'#eafaf1':'#fef9e7'};border:1.5px solid ${ok?'#27ae60':'#e8a020'}">
        <span style="font-weight:900;font-size:13px;color:${ok?'#1a7a4a':'#7d6500'};white-space:nowrap">Grupo ${g} ${ok?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg>':'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>'} ${count}/4</span>
        <span style="font-size:12px;color:#555;flex:1">${teams || '<em>Sin equipos</em>'}</span>
      </div>`;
    }).join('');

    const selectedTime = window._fixtureConfig?.startTime || '8:30';
    const courtCards = groupNames.map(g => {
      const savedName = window._fixtureConfig?.courtNames?.[g] || '';
      return `
      <div style="flex:1;background:var(--green-pale);border:2px solid var(--green);border-radius:var(--radius-sm);padding:10px 8px;text-align:center;min-width:0">
        <div style="margin-bottom:6px;display:flex;justify-content:center">${_svgI(`<rect x="2" y="4" width="20" height="16" rx="2"/><line x1="12" y1="4" x2="12" y2="20"/><path d="M9 12a3 3 0 0 0 6 0"/>`, 28)}</div>
        <div style="font-size:10px;color:var(--text-light);font-weight:700;margin-bottom:4px">GRUPO ${g}</div>
        <input type="text" id="court-name-${g}"
          value="${escHtml(savedName)}" placeholder="N° cancha"
          oninput="setCourtName('${g}',this.value)"
          style="width:100%;text-align:center;font-size:14px;font-weight:900;padding:5px 4px;border:1.5px solid var(--green);border-radius:6px;background:white;color:var(--green-dark);box-sizing:border-box">
      </div>`;
    }).join('');
    const horarioChips = ['8:30','11:30'].map(h => `
      <div onclick="setFixtureHorario('${h}')"
        style="flex:1;padding:12px 8px;border-radius:var(--radius-sm);text-align:center;cursor:pointer;font-weight:800;font-size:14px;transition:all 0.18s;
          ${selectedTime===h ? 'background:var(--green);color:white;border:2px solid var(--green);box-shadow:var(--shadow-green)' : 'background:white;color:var(--text-light);border:2px solid var(--border)'}">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> ${h} hrs
      </div>`).join('');

    return `
      <div class="section-header"><span class="section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h7v7H3z"/><path d="M14 3h7v7h-7z"/><path d="M3 14h7v7H3z"/><path d="M14 14h7v7h-7z"/></svg> Armar Grupos</span></div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
        <div class="card" style="margin:0">
          <div class="input-label" style="margin-bottom:8px;display:flex;align-items:center;gap:5px">${SVG_COURT} Número de Canchas</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px">${courtCards}</div>
          <div style="font-size:12px;color:var(--text-light);margin-top:6px"><strong>${numGroups} cancha${numGroups>1?'s':''}</strong> para ${n} equipos.</div>
        </div>
        <div class="card" style="margin:0">
          <div class="input-label" style="margin-bottom:8px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Horario de Inicio</div>
          <div style="display:flex;flex-direction:column;gap:8px">${horarioChips}</div>
        </div>
      </div>

      <div class="card" style="margin-bottom:12px">
        <div class="input-label" style="margin-bottom:8px">Asignar Equipos a Grupos</div>
        ${teamRows}
      </div>

      <div class="card" style="margin-bottom:12px">
        <div class="input-label" style="margin-bottom:8px">Resumen</div>
        ${groupPreview}
      </div>

      <button class="btn btn-primary btn-full" style="${canGenerate?'':'opacity:0.45;cursor:not-allowed'}"
        ${canGenerate?`onclick="confirmGenerateFixture()"`:'disabled'}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg> ${canGenerate ? 'Confirmar grupos' : 'Completa los grupos (4 equipos c/u)'}
      </button>`;
  }

  const groupsHtml = cat.groups.map((group, gi) => {
    const teamsHtml = group.teamIds.map((tid, idx) => {
      const team = getTeamById(tid, cat);
      if (!team) return '';
      return `
        <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--green-pale)">
          <span style="width:24px;height:24px;border-radius:50%;background:var(--green-pale);color:var(--green-dark);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">${idx+1}</span>
          <span id="grupo-team-name-${gi}-${idx}" style="flex:1;font-weight:600;font-size:14px;color:var(--text)">${escHtml(team.name)}</span>
          <div id="grupo-team-edit-${gi}-${idx}" style="display:none;flex:1;gap:6px;display:none;align-items:center">
            <input id="grupo-team-input-${gi}-${idx}" class="input" style="height:32px;font-size:13px" value="${escHtml(team.name)}" onkeydown="if(event.key==='Enter')saveGrupoTeamName('${tid}',${gi},${idx})">
            <button class="btn btn-primary btn-xs" onclick="saveGrupoTeamName('${tid}',${gi},${idx})">✓</button>
            <button class="btn btn-secondary btn-xs" onclick="cancelGrupoEdit(${gi},${idx})">✕</button>
          </div>
          ${!cat.fixtureGenerated ? `<button class="btn btn-secondary btn-xs btn-icon" id="grupo-edit-btn-${gi}-${idx}" onclick="startGrupoEdit('${tid}',${gi},${idx})" style="flex-shrink:0"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></button>
          <button class="btn btn-danger btn-xs btn-icon" onclick="removeTeamFromGroup('${group.id}','${tid}',${gi},${idx})" style="flex-shrink:0"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></button>` : ''}
        </div>`;
    }).join('');

    // Equipos disponibles (no asignados a este grupo)
    const assignedIds = cat.groups.flatMap(g => g.teamIds);
    const available = cat.teams.filter(t => !assignedIds.includes(t.id));
    const addSelect = !cat.fixtureGenerated && available.length > 0 ? `
      <div style="display:flex;gap:8px;margin-top:10px">
        <select id="grupo-add-select-${gi}" class="input" style="height:36px;font-size:13px;flex:1">
          <option value="">— Seleccionar equipo —</option>
          ${available.map(t => `<option value="${t.id}">${escHtml(t.name)}</option>`).join('')}
        </select>
        <button class="btn btn-primary btn-sm" onclick="addTeamToGroup('${group.id}',${gi})">+ Agregar</button>
      </div>` : '';

    return `
      <div class="card" style="margin-bottom:16px;padding:0;overflow:hidden">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px 10px;border-bottom:1px solid var(--border)">
          <div>
            <div style="font-weight:700;font-size:15px;color:var(--green-dark);display:flex;align-items:center;gap:6px">${SVG_USERS} ${escHtml(group.name)}</div>
            <div style="font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:4px">${group.cancha ? `${SVG_COURT} Cancha ${escHtml(group.cancha)} · ` : ''}${group.teamIds.length} equipos</div>
          </div>
          <button class="btn btn-secondary btn-xs" onclick="openEditGroupModal('${group.id}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg> Editar</button>
        </div>
        <div style="padding:0 14px 12px">
          ${teamsHtml}
          ${addSelect}
        </div>
      </div>`;
  }).join('');

  const fixtureBtn = !cat.fixtureGenerated
    ? `<div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn btn-secondary" style="flex:1" onclick="editGrupos()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg> Editar Grupos</button>
        <button class="btn btn-primary" style="flex:1" onclick="createFixture()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Crear Fixture</button>
      </div>`
    : `<div class="alert alert-success" style="margin-top:8px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg> Fixture creado.</div>`
    + `<div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn btn-secondary" style="flex:1" onclick="openEditarGruposModal()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg> Editar Grupos</button>
        <button class="btn btn-danger" style="flex:1" onclick="deleteFixture()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg> Eliminar Fixture</button>
       </div>`;

  return `

    <div class="section-header">
      <span class="section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h7v7H3z"/><path d="M14 3h7v7h-7z"/><path d="M3 14h7v7H3z"/><path d="M14 14h7v7h-7z"/></svg> Grupos</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 12px;align-items:start">
      ${groupsHtml}
    </div>
    ${fixtureBtn}`;
}

function startGrupoEdit(tid, gi, idx) {
  document.getElementById(`grupo-team-name-${gi}-${idx}`).style.display = 'none';
  document.getElementById(`grupo-edit-btn-${gi}-${idx}`).style.display = 'none';
  const editDiv = document.getElementById(`grupo-team-edit-${gi}-${idx}`);
  editDiv.style.display = 'flex';
  setTimeout(() => document.getElementById(`grupo-team-input-${gi}-${idx}`)?.focus(), 50);
}
function cancelGrupoEdit(gi, idx) {
  document.getElementById(`grupo-team-name-${gi}-${idx}`).style.display = '';
  document.getElementById(`grupo-edit-btn-${gi}-${idx}`).style.display = '';
  document.getElementById(`grupo-team-edit-${gi}-${idx}`).style.display = 'none';
}
function saveGrupoTeamName(tid, gi, idx) {
  const val = document.getElementById(`grupo-team-input-${gi}-${idx}`)?.value.trim();
  if (!val) return;
  const cat = getActiveCategory();
  const team = getTeamById(tid, cat);
  if (team) { team.name = val; saveState(); renderPage(); }
}
function removeTeamFromGroup(groupId, teamId, gi, idx) {
  if (!confirm('¿Quitar este equipo del grupo?')) return;
  const cat = getActiveCategory();
  const group = cat.groups.find(g => g.id === groupId);
  if (!group) return;
  group.teamIds = group.teamIds.filter(id => id !== teamId);
  // También quitar los partidos del grupo donde participe este equipo
  group.rounds.forEach(r => { r.matches = r.matches.filter(m => m.team1Id !== teamId && m.team2Id !== teamId); });
  saveState(); renderPage();
}
function addTeamToGroup(groupId, gi) {
  const sel = document.getElementById(`grupo-add-select-${gi}`);
  const teamId = sel?.value;
  if (!teamId) return;
  const cat = getActiveCategory();
  const group = cat.groups.find(g => g.id === groupId);
  if (!group) return;
  group.teamIds.push(teamId);
  saveState(); renderPage();
}

function renderFixturePage() {
  const cat = getActiveCategory();
  if (!cat) return '<div class="empty-state"><div class="icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div><h3>Sin categoría</h3><p>Selecciona una categoría primero.</p></div>';
  if (!cat.fixtureGenerated) return `
    <div class="empty-state">
      <div class="icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
      <h3>Sin fixture</h3>
      <p>Ve a <strong>Equipos</strong>, agrega los equipos y genera el fixture.</p>
      <button class="btn btn-outline" onclick="navigate('equipos')">Ir a Equipos</button>
    </div>`;

  const startTime = cat.fixtureConfig?.startTime || null;

  // Horarios (izquierda) + buscador (derecha) en la misma fila
  let horariosHtml = '';
  if (startTime) {
    const numSlots = (cat.groups[0]?.rounds?.length || 3) * 2;
    const slots = Array.from({length: numSlots}, (_, i) => {
      const [h,m] = startTime.split(':').map(Number);
      const total = h*60 + m + i*30;
      return `${String(Math.floor(total/60)).padStart(2,'0')}:${String(total%60).padStart(2,'0')}`;
    });
    const courtsLabel = cat.fixtureConfig?.courts
      ? `<span style="font-size:10px;color:var(--text-light);white-space:nowrap">· ${cat.fixtureConfig.courts} cancha${cat.fixtureConfig.courts>1?'s':''}</span>` : '';
    horariosHtml = `
      <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;color:var(--green-dark)"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        ${slots.map((s, i) => `<span style="font-size:11px;font-weight:700;color:var(--green-dark);background:white;padding:2px 8px;border-radius:8px;border:1px solid var(--green);white-space:nowrap;flex-shrink:0">${s}</span>${i < slots.length-1 ? '<span style="color:var(--text-muted);font-size:9px;flex-shrink:0">›</span>' : ''}`).join('')}
        ${courtsLabel}
      </div>`;
  }

  return `
    <div class="section-header"><span class="section-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Fixture</span></div>
    <div style="padding:10px 13px;background:var(--green-pale);border-radius:var(--radius-sm);border:1.5px solid var(--green);margin-bottom:14px">
      <div class="hub-search-wrap">
        <input class="input hub-search" type="text" placeholder="Buscar equipo, cancha u horario..."
          value="${escHtml(_fixtureSearch)}"
          oninput="_fixtureSearchInput(this)"
          onkeydown="if(event.key==='Escape'){this.value='';_fixtureSearchInput(this)}"
          style="background-color:white">
      </div>
      ${horariosHtml ? `<div style="margin-top:8px">${horariosHtml}</div>` : ''}
    </div>
    <div id="fixture-results">${_buildFixtureResults(_fixtureSearch)}</div>
    ${!isApoderado() ? `<div style="margin-top:16px;margin-bottom:24px"><button class="btn btn-primary btn-full" onclick="openExportFixtureModal()">Exportar Fixture</button></div>` : ''}`;
}

function _fixtureSearchInput(el) {
  _fixtureSearch = el.value;
  const results = document.getElementById('fixture-results');
  if (results) results.innerHTML = _buildFixtureResults(_fixtureSearch);
}

function _buildFixtureResults(q) {
  const cat = getActiveCategory();
  if (!cat) return '';
  const ql = (q || '').toLowerCase().trim();
  const startTime = cat.fixtureConfig?.startTime || null;
  let html = '';
  let totalMatches = 0;

  const SVG_CLOCK = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
  const SVG_CHECK = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><polyline points="20 6 9 17 4 12"/></svg>`;
  const SVG_PENDING = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><path d="M5 22h14M5 2h14M17 22v-4.172a2 2 0 0 0-.586-1.414L12 12l-4.414 4.414A2 2 0 0 0 7 17.828V22M7 2v4.172a2 2 0 0 0 .586 1.414L12 12l4.414-4.414A2 2 0 0 0 17 6.172V2"/></svg>`;
  const SVG_COURT = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="12" y1="4" x2="12" y2="20"/><path d="M9 12a3 3 0 0 0 6 0"/></svg>`;
  const SVG_SOCCER = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 7l3 2.2-1.15 3.5h-3.7L9 9.2 12 7z"/><path d="M12 2v5M20.5 8.5L15 9.8M18.5 19.5l-4-5.8M5.5 19.5l4-5.8M3.5 8.5L9 9.8"/></svg>`;

  const hl = name => {
    if (!ql || !name) return escHtml(name || '');
    const idx = name.toLowerCase().indexOf(ql);
    if (idx === -1) return escHtml(name);
    return escHtml(name.slice(0, idx))
      + `<mark style="background:#fef08a;border-radius:3px;padding:0 1px">${escHtml(name.slice(idx, idx + ql.length))}</mark>`
      + escHtml(name.slice(idx + ql.length));
  };

  // Render una fila de partido
  const renderRow = (match, time) => {
    const t1 = getTeamById(match.team1Id, cat);
    const t2 = getTeamById(match.team2Id, cat);
    const n1 = ql ? hl(t1?.name || '?') : escHtml(t1?.name || '?');
    const n2 = ql ? hl(t2?.name || '?') : escHtml(t2?.name || '?');
    const c1 = t1?.color || '#ccc';
    const c2 = t2?.color || '#ccc';
    const timeHtml = time ? `<span class="fix-time">${SVG_CLOCK} ${time}</span>` : '';
    const statusTag = match.played
      ? `<span class="match-tag played">${SVG_CHECK}Jugado</span>`
      : `<span class="match-tag pending">${SVG_PENDING}</span>`;
    totalMatches++;
    return `<div class="fix-match-row ${match.played ? 'played' : ''}">
      ${timeHtml}
      <span class="fix-team"><span class="match-dot" style="background:${c1}"></span><span class="fix-team-name">${n1}</span></span>
      <span class="fix-vs">vs</span>
      <span class="fix-team right"><span class="fix-team-name">${n2}</span><span class="match-dot" style="background:${c2}"></span></span>
      ${statusTag}
    </div>`;
  };

  // Render tarjeta de grupo estilo stat-group-card
  const renderGroupCard = ({ group, matchingMatches }) => {
    const groupInit = group.name.replace('Grupo ', '').trim().slice(0, 2).toUpperCase();
    const canchaLabel = group.cancha
      ? `<span class="stat-group-sub">${SVG_COURT} Cancha ${escHtml(group.cancha)}</span>` : '';
    const playedCount = matchingMatches.filter(({match}) => match.played).length;
    const rows = matchingMatches.map(({match, ri, mi}) => renderRow(match, getMatchTime(startTime, ri, mi))).join('');
    return `<div class="stat-group-card">
      <div class="stat-group-header" style="background:linear-gradient(135deg,var(--green-dark) 0%,var(--green) 100%)">
        <div class="stat-group-header-watermark">${groupInit}</div>
        <div style="position:relative;z-index:1">
          <div class="stat-group-title">${SVG_SOCCER} ${escHtml(group.name)}</div>
          ${canchaLabel}
        </div>
        <div style="position:relative;z-index:1;margin-left:auto;text-align:right">
          <div style="font-size:10px;color:rgba(255,255,255,0.65);font-weight:600;text-transform:uppercase;letter-spacing:0.3px">${playedCount}/${matchingMatches.length} jugados</div>
        </div>
      </div>
      <div class="stat-group-body" style="padding:0">${rows}</div>
    </div>`;
  };

  // Recolectar grupos visibles
  const visibleGroups = [];
  for (const group of cat.groups) {
    const matchingMatches = [];
    group.rounds.forEach((round, ri) => {
      round.matches.forEach((match, mi) => {
        if (ql) {
          const t1 = getTeamById(match.team1Id, cat);
          const t2 = getTeamById(match.team2Id, cat);
          const time = getMatchTime(startTime, ri, mi) || '';
          const cancha = group.cancha || '';
          const matchesTeam = t1?.name?.toLowerCase().includes(ql) || t2?.name?.toLowerCase().includes(ql);
          const matchesCancha = cancha.toLowerCase().includes(ql);
          const matchesTime = time.includes(ql);
          if (!matchesTeam && !matchesCancha && !matchesTime) return;
        }
        matchingMatches.push({ match, ri, mi });
      });
    });
    if (matchingMatches.length) visibleGroups.push({ group, matchingMatches });
  }

  // Layout: pares de grupos en columnas
  for (let i = 0; i < visibleGroups.length; i += 2) {
    const left = visibleGroups[i];
    const right = visibleGroups[i + 1];
    if (right) {
      html += `<div class="groups-pair"><div>${renderGroupCard(left)}</div><div>${renderGroupCard(right)}</div></div>`;
    } else {
      html += renderGroupCard(left);
    }
  }

  // Fase eliminatoria
  if (cat.knockout) {
    const koVisible = [];
    for (const round of cat.knockout.rounds) {
      const rMatches = round.matches.filter(m => {
        if (!m.team1Id || !m.team2Id) return false;
        if (!ql) return true;
        const t1 = getTeamById(m.team1Id, cat);
        const t2 = getTeamById(m.team2Id, cat);
        return t1?.name?.toLowerCase().includes(ql) || t2?.name?.toLowerCase().includes(ql);
      });
      if (rMatches.length) koVisible.push({ round, rMatches });
    }
    if (koVisible.length) {
      const SVG_TROPHY = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>`;
      const deleteBtn = !ql && isAdmin()
        ? `<button class="btn btn-danger btn-sm" onclick="deleteKnockout()" style="flex-shrink:0;margin-left:auto"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg> Eliminar</button>` : '';

      let koRows = '';
      koVisible.forEach(({ round, rMatches }) => {
        koRows += `<div style="padding:8px 12px 4px;font-size:10px;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border)">${escHtml(round.name)}</div>`;
        rMatches.forEach(m => { koRows += renderRow(m, null); });
      });

      html += `<div class="stat-group-card" style="margin-top:16px">
        <div class="stat-group-header" style="background:linear-gradient(135deg,#92400e 0%,#d97706 100%)">
          <div class="stat-group-header-watermark" style="font-size:40px">KO</div>
          <div style="position:relative;z-index:1">
            <div class="stat-group-title">${SVG_TROPHY} Fase Eliminatoria</div>
          </div>
          ${deleteBtn}
        </div>
        <div class="stat-group-body" style="padding:0">${koRows}</div>
      </div>`;
    }
  }

  if (ql && !totalMatches) {
    html = `<div class="hub-empty">Sin partidos con "<strong>${escHtml(q)}</strong>".</div>`;
  }

  return html;
}

function renderMatchCard(match, cat, isKO=false, time=null, clickable=true) {
  const t1 = getTeamById(match.team1Id, cat);
  const t2 = getTeamById(match.team2Id, cat);
  const n1 = t1 ? t1.name : (isKO ? 'Por definir' : '?');
  const n2 = t2 ? t2.name : (isKO ? 'Por definir' : '?');
  const c1 = t1 ? t1.color : '#ccc';
  const c2 = t2 ? t2.color : '#ccc';
  const played = match.played;
  const tbd = isKO && (!match.team1Id || !match.team2Id);
  const blocked = !clickable;
  const timeTag = time ? `<span style="font-size:11px;font-weight:900;color:var(--green-dark);background:var(--green-pale);padding:2px 9px;border-radius:8px;border:1px solid var(--green)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> ${time} hrs</span>` : '';
  return `
    <div class="match-card ${played ? 'played' : 'pending'}" style="${blocked ? 'cursor:default' : ''}" onclick="${(tbd || blocked) ? '' : `openMatchEntry('${match.id}','${isKO?'ko':'group'}')`}">
      <div class="match-card-top">
        <div class="match-card-watermark"></div>
        <div class="match-teams">
          <span class="match-team"><span class="match-dot" style="background:${c1}"></span>${escHtml(n1)}</span>
          <div class="match-score-box">
            ${played ? `<span class="score-num">${match.score1}</span><span class="score-sep">—</span><span class="score-num">${match.score2}</span>`
                     : `<span class="score-num" style="font-size:15px;opacity:0.6">${tbd ? '?' : 'vs'}</span>`}
          </div>
          <span class="match-team right">${escHtml(n2)}<span class="match-dot" style="background:${c2};margin-left:5px;margin-right:0"></span></span>
        </div>
      </div>
      <div class="match-card-bottom">
        <div class="match-meta">
          ${timeTag}
          <span class="match-tag ${played ? 'played' : 'pending'}">${played ? '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:3px"><polyline points="20 6 9 17 4 12"/></svg>Jugado' : '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><path d="M5 22h14M5 2h14M17 22v-4.172a2 2 0 0 0-.586-1.414L12 12l-4.414 4.414A2 2 0 0 0 7 17.828V22M7 2v4.172a2 2 0 0 0 .586 1.414L12 12l4.414-4.414A2 2 0 0 0 17 6.172V2"/></svg> Pendiente'}</span>
        </div>
      </div>
    </div>`;
}

/* ═══════════════════════ RESULTADOS PAGE ═══════════════════════ */
function _resultadosSearchInput(el) {
  _resultadosSearch = el.value;
  const results = document.getElementById('resultados-results');
  if (results) results.innerHTML = _buildResultadosResults(_resultadosSearch);
}

function _buildResultadosResults(q) {
  const cat = getActiveCategory();
  if (!cat) return '';
  const ql = q.trim().toLowerCase();

  const startTime = cat.fixtureConfig?.startTime || null;
  function matchTime(ri, mi) {
    if (!startTime) return null;
    const [h, m] = startTime.split(':').map(Number);
    const total = h * 60 + m + (ri * 2 + mi) * 30;
    return `${String(Math.floor(total/60)).padStart(2,'0')}:${String(total%60).padStart(2,'0')}`;
  }

  const hl = str => {
    if (!ql || !str) return escHtml(str || '');
    const idx = str.toLowerCase().indexOf(ql);
    if (idx < 0) return escHtml(str);
    return escHtml(str.slice(0, idx)) + `<mark style="background:#fef08a;border-radius:3px;padding:0 1px">${escHtml(str.slice(idx, idx + ql.length))}</mark>` + escHtml(str.slice(idx + ql.length));
  };

  const matchesQuery = (match, ri, mi) => {
    if (!ql) return true;
    const t1 = getTeamById(match.team1Id, cat);
    const t2 = getTeamById(match.team2Id, cat);
    if ((t1?.name || '').toLowerCase().includes(ql)) return true;
    if ((t2?.name || '').toLowerCase().includes(ql)) return true;
    const time = matchTime(ri, mi);
    if (time && time.includes(ql)) return true;
    return false;
  };

  const matchesQueryKO = (match) => {
    if (!ql) return true;
    const t1 = getTeamById(match.team1Id, cat);
    const t2 = getTeamById(match.team2Id, cat);
    if ((t1?.name || '').toLowerCase().includes(ql)) return true;
    if ((t2?.name || '').toLowerCase().includes(ql)) return true;
    return false;
  };

  const renderCard = (match, isKO, time) => {
    const t1 = getTeamById(match.team1Id, cat);
    const t2 = getTeamById(match.team2Id, cat);
    const timeTag = time
      ? `<span style="font-size:11px;font-weight:900;color:var(--green-dark);background:var(--green-pale);padding:2px 8px;border-radius:8px;border:1px solid var(--green)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> ${time}</span>`
      : '';
    let detail = '';
    if (match.played) {
      const esp = match.espiritu
        ? `<span class="espiritu-badge"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> ${escHtml(getTeamById(match.espiritu, cat)?.name||'')}</span>` : '';
      const scorerMap = {};
      (match.scorers || []).forEach(s => {
        const k = s.playerName + '||' + s.teamId;
        if (!scorerMap[k]) scorerMap[k] = { name: s.playerName, goals: 0 };
        scorerMap[k].goals++;
      });
      const scorersList = Object.values(scorerMap)
        .map(s => `${escHtml(s.name)}${s.goals > 1 ? ` <strong>(${s.goals})</strong>` : ''}`)
        .join(' · ');
      const notes = match.notes ? `<span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg> ${escHtml(match.notes)}</span>` : '';
      if (esp || scorersList || notes)
        detail = `${esp}${scorersList ? `<span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><circle cx="12" cy="12" r="10"/><path d="M12 7l3 2.2-1.15 3.5h-3.7L9 9.2 12 7z"/><path d="M12 2v5M20.5 8.5L15 9.8M18.5 19.5l-4-5.8M5.5 19.5l4-5.8M3.5 8.5L9 9.8"/></svg> ${scorersList}</span>` : ''}${notes}`;
    }
    const n1 = ql ? hl(t1?.name || '?') : escHtml(t1?.name || '?');
    const n2 = ql ? hl(t2?.name || '?') : escHtml(t2?.name || '?');
    return `
      <div class="match-card ${match.played ? 'played' : 'pending'}" ${isApoderado() ? 'style="cursor:default"' : `onclick="openMatchEntry('${match.id}','${isKO?'ko':'group'}')"`}>
        <div class="match-card-top">
          <div class="match-card-watermark"></div>
          <div class="match-teams">
            <span class="match-team"><span class="match-dot" style="background:${t1?.color||'#ccc'}"></span>${n1}</span>
            <div class="match-score-box">
              ${match.played
                ? `<span class="score-num">${match.score1}</span><span class="score-sep">—</span><span class="score-num">${match.score2}</span>`
                : `<span class="score-num" style="font-size:13px;opacity:0.65">vs</span>`}
            </div>
            <span class="match-team right">${n2}<span class="match-dot" style="background:${t2?.color||'#ccc'};margin-left:5px;margin-right:0"></span></span>
          </div>
        </div>
        <div class="match-card-bottom">
          <div class="match-meta">
            <span class="match-tag ${match.played ? 'played' : 'pending'}">${match.played ? '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:3px"><polyline points="20 6 9 17 4 12"/></svg>Jugado' : '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><path d="M5 22h14M5 2h14M17 22v-4.172a2 2 0 0 0-.586-1.414L12 12l-4.414 4.414A2 2 0 0 0 7 17.828V22M7 2v4.172a2 2 0 0 0 .586 1.414L12 12l4.414-4.414A2 2 0 0 0 17 6.172V2"/></svg> Pendiente'}</span>
            ${timeTag}
            ${detail ? `<div style="width:100%;margin-top:2px">${detail}</div>` : ''}
            ${_editedByTag(match)}
          </div>
        </div>
      </div>`;
  };

  let html = '';
  let totalMatches = 0;

  // ── Botón Generar Eliminatoria (antes del primer grupo) ──
  if (!ql && isAdmin() && cat.fixtureGenerated && !cat.knockout && isGroupStageComplete(cat)) {
    html += `<div style="display:flex;justify-content:flex-end;margin-bottom:10px">
      <button class="btn btn-gold btn-sm" onclick="generateKnockout()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
        Generar Eliminatoria
      </button>
    </div>`;
  }

  // ── Fase de grupos ──
  for (const group of cat.groups) {
    // Check cancha match
    const searchableCancha = group.cancha ? `cancha ${group.cancha}`.toLowerCase() : '';
    const canchaMatch = ql && searchableCancha && searchableCancha.includes(ql);
    const matchingCards = [];
    group.rounds.forEach((round, ri) => {
      round.matches.forEach((match, mi) => {
        if (canchaMatch || matchesQuery(match, ri, mi)) {
          matchingCards.push(renderCard(match, false, matchTime(ri, mi)));
        }
      });
    });
    if (!ql || matchingCards.length > 0) {
      const glabelRaw = group.cancha ? `${group.name} — Cancha ${group.cancha}` : group.name;
      const glabel = (canchaMatch && group.cancha)
        ? `${escHtml(group.name)} — Cancha <mark style="background:#fef08a;border-radius:3px;padding:0 1px">${escHtml(group.cancha)}</mark>`
        : escHtml(glabelRaw);
      // If cancha matches, show all group matches; else only matching
      const finalCards = canchaMatch
        ? group.rounds.flatMap((round, ri) => round.matches.map((match, mi) => renderCard(match, false, matchTime(ri, mi))))
        : matchingCards;
      if (!ql || finalCards.length > 0) {
        html += `<div class="group-header"><span class="group-label">${glabel}</span><div class="group-line"></div></div>`;
        html += finalCards.join('');
        totalMatches += finalCards.length;
      }
    }
  }

  // ── Eliminatoria ──
  if (cat.knockout) {
    let koHtml = '';
    for (const round of cat.knockout.rounds) {
      const roundCards = [];
      for (const match of round.matches) {
        if (match.team1Id && match.team2Id && matchesQueryKO(match)) {
          roundCards.push(renderCard(match, true, null));
        }
      }
      if (!ql || roundCards.length > 0) {
        koHtml += `<div class="round-label">${escHtml(round.name)}</div>` + roundCards.join('');
        totalMatches += roundCards.length;
      }
    }
    if (koHtml) {
      html += `<div class="group-header" style="margin-top:20px">
        <span class="group-label" style="background:linear-gradient(135deg,#d97706,#f59e0b)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg> Fase Eliminatoria</span>
        <div class="group-line" style="background:linear-gradient(90deg,#fef3c7,transparent)"></div>
      </div>` + koHtml;
    }
  }

  if (ql && totalMatches === 0) {
    html = `<div class="empty-state" style="padding:30px 0"><div class="icon" style="font-size:2rem"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div><p>Sin partidos con "<strong>${escHtml(q.trim())}</strong>"</p></div>`;
  }

  return html;
}

function isGroupStageComplete(cat) {
  for (const g of cat.groups) for (const r of g.rounds) for (const m of r.matches) if (!m.played) return false;
  return cat.groups.length > 0;
}

/* ═══════════════════════ POSICIONES PAGE ═══════════════════════ */
function buildScorersTable(cat) {
  const map = {};
  const addScorers = (matches) => {
    for (const m of matches) {
      if (!m.played) continue;
      for (const s of (m.scorers || [])) {
        const key = s.playerName + '||' + s.teamId;
        if (!map[key]) map[key] = { playerName: s.playerName, teamId: s.teamId, goals: 0 };
        map[key].goals++;
      }
    }
  };
  for (const g of (cat.groups || [])) for (const r of g.rounds) addScorers(r.matches);
  if (cat.knockout) for (const r of cat.knockout.rounds) addScorers(r.matches);
  return Object.values(map).sort((a, b) => b.goals - a.goals || a.playerName.localeCompare(b.playerName));
}

    standings.forEach((s, i) => {

  } else if (isAdmin() && isGroupStageComplete(cat)) {
    html += `<div class="alert alert-success" style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:12px">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg> Fase de grupos completada. <button class="btn btn-gold btn-sm" onclick="generateKnockout()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg> Generar Eliminatoria</button></div>`;
  }

  /* ── Tabla de Goleadores ── */
  const scorers = buildScorersTable(cat);
  html += `<div class="section-title" style="margin-top:28px;margin-bottom:14px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg> Tabla de Goleadores</div>`;
  if (scorers.length === 0) {
    html += `<div class="alert alert-info"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Aún no hay goles registrados. Ingresa los resultados con goleadores desde Partidos.</div>`;
  } else {
    const maxGoals = scorers[0]?.goals || 1;
    html += `<div class="stat-group-card"><table class="standings-table"><thead><tr>
      <th style="width:28px">#</th>
      <th class="left">Jugador</th>
      <th class="left">Equipo</th>
      <th title="Goles" style="color:var(--green-dark)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><circle cx="12" cy="12" r="10"/><path d="M12 7l3 2.2-1.15 3.5h-3.7L9 9.2 12 7z"/><path d="M12 2v5M20.5 8.5L15 9.8M18.5 19.5l-4-5.8M5.5 19.5l4-5.8M3.5 8.5L9 9.8"/></svg></th>
    </tr></thead><tbody>`;
    scorers.forEach((s, i) => {
      const team = getTeamById(s.teamId, cat);
      const medal = i === 0 ? '<span class="pos-badge gold">1</span>' : i === 1 ? '<span class="pos-badge silver">2</span>' : i === 2 ? '<span class="pos-badge bronze">3</span>' : `<span class="pos-badge other">${i+1}</span>`;
      const rowCls = i === 0 ? 'qualify-1' : i === 1 ? 'qualify-2' : i === 2 ? 'qualify' : '';
      const pct = Math.round((s.goals / maxGoals) * 100);
      const barHtml = `<span class="scorer-bar-wrap"><span class="scorer-bar" style="width:${pct}%"></span></span>`;
      html += `<tr class="${rowCls}">
        <td style="text-align:center">${medal}</td>
        <td class="left" style="font-weight:700">${escHtml(s.playerName)}</td>
        <td class="left">
          <span class="color-swatch" style="background:${team?.color||'#ccc'};margin-right:5px"></span>
          <span style="color:var(--text-light)">${escHtml(team?.name||'?')}</span>
        </td>
        <td style="text-align:center">
          <span class="scorer-goals-cell">${s.goals}</span>${barHtml}
        </td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  }

  return html;
}

/* ═══════════════════════ MATCH ENTRY MODAL ═══════════════════════ */
let currentMatchId = null;
let currentMatchType = null;
let editScore1 = 0, editScore2 = 0;
let editScorers = [];
let editEspiritu = null;
let editNotes = '';
let _addingScorerTeamId = null;

function openMatchEntry(matchId, type) {
  currentMatchId = matchId;
  currentMatchType = type;
  const cat = getActiveCategory();
  let match = null;
  if (type === 'ko') {
    match = findKnockoutMatch(cat, matchId);
  } else {
    for (const g of cat.groups) for (const r of g.rounds) for (const m of r.matches) if (m.id === matchId) { match = m; break; }
  }
  if (!match) return;
  const t1 = getTeamById(match.team1Id, cat);
  const t2 = getTeamById(match.team2Id, cat);

  // Apoderado: solo lectura, sin interacción
  if (isApoderado()) return;

  editScore1 = match.played ? match.score1 : 0;
  editScore2 = match.played ? match.score2 : 0;
  editScorers = match.scorers ? JSON.parse(JSON.stringify(match.scorers)) : [];
  editEspiritu = match.espiritu || null;
  editNotes = match.notes || '';
  _addingScorerTeamId = null;
  document.getElementById('modal-title').innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0;margin-right:5px"><circle cx="12" cy="12" r="10"/><path d="M12 7l3 2.2-1.15 3.5h-3.7L9 9.2 12 7z"/><path d="M12 2v5M20.5 8.5L15 9.8M18.5 19.5l-4-5.8M5.5 19.5l4-5.8M3.5 8.5L9 9.8"/></svg>' + (t1?.name||'?') + ' vs ' + (t2?.name||'?');
  renderMatchEntryBody(cat, match, t1, t2);
  document.getElementById('modal-footer').classList.remove('hidden');
  document.getElementById('modal-footer').innerHTML = `
    <button class="btn btn-primary btn-full" onclick="saveMatchResult('${matchId}','${type}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Guardar Resultado</button>
    ${match.played ? `<button class="btn btn-secondary btn-full" style="margin-top:8px" onclick="clearMatchResult('${matchId}','${type}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg> Borrar resultado</button>` : ''}`;
  openModal();
}

function _renderMatchReadOnly(cat, match, t1, t2) {

  const c2 = t2?.color || '#ccc';

  if (!match.played) {
    return `
      <div style="text-align:center;padding:24px 0">
        <div style="font-size:2.5rem;margin-bottom:8px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><path d="M5 22h14M5 2h14M17 22v-4.172a2 2 0 0 0-.586-1.414L12 12l-4.414 4.414A2 2 0 0 0 7 17.828V22M7 2v4.172a2 2 0 0 0 .586 1.414L12 12l4.414-4.414A2 2 0 0 0 17 6.172V2"/></svg></div>
        <p style="color:var(--text-muted);font-size:14px">Partido pendiente</p>
        <div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:20px">
          <span style="font-weight:700;font-size:15px;color:${c1}">${escHtml(t1?.name||'?')}</span>
          <span style="font-size:13px;color:var(--text-muted);font-weight:600">vs</span>
          <span style="font-weight:700;font-size:15px;color:${c2}">${escHtml(t2?.name||'?')}</span>
        </div>
      </div>`;
  }

  // Scorers agrupados
  const scorerMap = {};
  (match.scorers || []).forEach(s => {
    const k = s.playerName + '||' + s.teamId;
    if (!scorerMap[k]) scorerMap[k] = { name: s.playerName, teamId: s.teamId, goals: 0 };
    scorerMap[k].goals++;
  });
  const t1Scorers = Object.values(scorerMap).filter(s => s.teamId === t1?.id);
  const t2Scorers = Object.values(scorerMap).filter(s => s.teamId === t2?.id);

  const scorerCol = (scorers, color) => scorers.length
    ? scorers.map(s => `<div style="font-size:13px;margin-bottom:4px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><circle cx="12" cy="12" r="10"/><path d="M12 7l3 2.2-1.15 3.5h-3.7L9 9.2 12 7z"/><path d="M12 2v5M20.5 8.5L15 9.8M18.5 19.5l-4-5.8M5.5 19.5l4-5.8M3.5 8.5L9 9.8"/></svg> ${escHtml(s.name)}${s.goals > 1 ? ` <strong>(${s.goals})</strong>` : ''}</div>`).join('')
    : `<div style="font-size:12px;color:var(--text-muted);font-style:italic">Sin goles</div>`;

  const esp = match.espiritu ? getTeamById(match.espiritu, cat) : null;
  const notes = match.notes ? `
    <div style="margin-top:14px;padding:10px 12px;background:var(--green-pale);border-radius:8px;font-size:13px">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg> ${escHtml(match.notes)}
    </div>` : '';

  return `
    <div style="padding:4px 0">
      <!-- Marcador -->
      <div style="display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:20px">
        <div style="flex:1;text-align:center">
          <div style="width:10px;height:10px;border-radius:50%;background:${c1};display:inline-block;margin-bottom:6px"></div>
          <div style="font-weight:700;font-size:14px;margin-bottom:4px">${escHtml(t1?.name||'?')}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;padding:8px 16px;background:var(--green-pale);border-radius:12px;border:1.5px solid var(--green);margin:0 8px">
          <span style="font-size:2rem;font-weight:900;color:var(--green-dark);min-width:28px;text-align:center">${match.score1}</span>
          <span style="font-size:1.2rem;color:var(--text-muted)">—</span>
          <span style="font-size:2rem;font-weight:900;color:var(--green-dark);min-width:28px;text-align:center">${match.score2}</span>
        </div>
        <div style="flex:1;text-align:center">
          <div style="width:10px;height:10px;border-radius:50%;background:${c2};display:inline-block;margin-bottom:6px"></div>
          <div style="font-weight:700;font-size:14px;margin-bottom:4px">${escHtml(t2?.name||'?')}</div>
        </div>
      </div>

      <!-- Goleadores -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
        <div style="padding:10px;background:#f8fafc;border-radius:8px">${scorerCol(t1Scorers, c1)}</div>
        <div style="padding:10px;background:#f8fafc;border-radius:8px">${scorerCol(t2Scorers, c2)}</div>
      </div>

      <!-- Espíritu -->
      ${esp ? `<div style="text-align:center;padding:8px;background:linear-gradient(135deg,#fef9c3,#fef3c7);border-radius:8px;font-size:13px;font-weight:600;color:#92400e"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> Espíritu: ${escHtml(esp.name)}</div>` : ''}

      ${notes}

      <!-- Audit -->
      ${match.editedBy ? `<div style="margin-top:12px;text-align:center;font-size:11px;color:var(--text-muted)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg> ${escHtml(match.editedBy)} · ${_timeAgo(match.editedAt)}</div>` : ''}
    </div>`;
}

function renderMatchEntryBody(cat, match, t1, t2) {
  const c1 = t1?.color || '#ccc', c2 = t2?.color || '#ccc';

  // Build scorer column for one team
  function scorerCol(teamId, team, color) {
    // Agrupar por jugador y contar goles
    const grouped = {};
    editScorers.filter(s => s.teamId === teamId).forEach(s => {
      grouped[s.playerName] = (grouped[s.playerName] || 0) + 1;
    });
    const isAdding = _addingScorerTeamId === teamId;

    const itemsHtml = Object.entries(grouped).map(([name, count]) => {
      const enc = encodeURIComponent(name);
      return `
      <div style="display:flex;align-items:center;gap:4px;margin-bottom:6px">
        <span style="font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><circle cx="12" cy="12" r="10"/><path d="M12 7l3 2.2-1.15 3.5h-3.7L9 9.2 12 7z"/><path d="M12 2v5M20.5 8.5L15 9.8M18.5 19.5l-4-5.8M5.5 19.5l4-5.8M3.5 8.5L9 9.8"/></svg> ${escHtml(name)}</span>
        <div style="display:flex;align-items:center;gap:3px;flex-shrink:0">
          <button class="btn btn-secondary btn-xs btn-icon"
            style="width:28px;height:28px;padding:0;font-size:18px;line-height:1"
            onclick="removeOneGoal('${enc}','${teamId}')">−</button>
          <span style="font-size:14px;font-weight:900;min-width:22px;text-align:center;color:var(--green-dark)">${count}</span>
          <button class="btn btn-primary btn-xs btn-icon"
            style="width:28px;height:28px;padding:0;font-size:18px;line-height:1"
            onclick="addGoalToScorer('${enc}','${teamId}')">+</button>
        </div>
      </div>`;
    }).join('');

    const emptyHtml = Object.keys(grouped).length === 0 && !isAdding
      ? `<div style="font-size:12px;color:var(--text-light);padding:2px 0 4px">Sin goles</div>` : '';

    const roster = (team?.roster || []).filter(p => p && p.trim());
    const rosterHtml = roster.length > 0
      ? `<div style="margin-bottom:8px">
           <div style="font-size:10px;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:5px">Jugadores del equipo</div>
           <div style="display:flex;flex-wrap:wrap;gap:4px">
             ${roster.map(p => {
               const ep = encodeURIComponent(p);
               return `<button class="btn btn-outline btn-xs" style="border-radius:12px;font-size:11px;padding:3px 9px;font-weight:700" onclick="quickAddScorer('${ep}','${teamId}')">${escHtml(p)}</button>`;
             }).join('')}
           </div>
         </div>` : '';

    const addFormHtml = isAdding
      ? `<div style="margin-top:6px">
          ${rosterHtml}
          <div style="font-size:10px;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:5px">Nuevo jugador</div>
          <div style="display:flex;flex-direction:column;gap:5px">
            <input class="input" id="inline-scorer-${teamId}" type="text" placeholder="Nombre del jugador..."
              style="width:100%;padding:7px 8px;font-size:12px;box-sizing:border-box"
              onkeydown="if(event.key==='Enter')confirmInlineScorer('${teamId}')">
            <div style="display:flex;gap:5px">
              <button class="btn btn-primary btn-xs" style="flex:1" onclick="confirmInlineScorer('${teamId}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg> OK</button>
              <button class="btn btn-secondary btn-xs" onclick="cancelInlineScorer()">✕</button>
            </div>
          </div>
        </div>`
      : `<button class="btn btn-outline btn-xs btn-full" style="margin-top:4px"
          onclick="startAddScorer('${teamId}')">+ Nuevo jugador</button>`;

    return `<div class="scorer-col-inner" style="flex:1;min-width:0;padding:10px;background:var(--bg);border-radius:var(--radius-sm)">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid ${color}55">
        <div style="width:10px;height:10px;border-radius:50%;background:${color};flex-shrink:0"></div>
        <span style="font-size:12px;font-weight:900;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(team?.name||'?')}</span>
      </div>
      ${emptyHtml}${itemsHtml}${addFormHtml}
    </div>`;
  }

  const espHtml = [
    { id: match.team1Id, name: t1?.name || '?', color: c1 },
    { id: null, name: 'Ninguno', color: '#ccc' },
    { id: match.team2Id, name: t2?.name || '?', color: c2 }
  ].map(opt => `
    <div class="espiritu-option ${editEspiritu === opt.id ? 'selected' : ''}" onclick="setEspiritu(${opt.id ? "'"+opt.id+"'" : 'null'})">
      <div class="espiritu-icon">${opt.id ? '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>' : '—'}</div>
      <div style="font-size:11px">${escHtml(opt.name)}</div>
    </div>`).join('');

  document.getElementById('modal-body').innerHTML = `
    <div class="input-label" style="margin-bottom:6px">Resultado</div>
    <div class="score-entry-teams">
      <div class="score-entry-team">
        <div class="score-entry-team-dot" style="background:${c1}"></div>
        <div class="score-entry-team-name">${escHtml(t1?.name||'?')}</div>
        <div class="score-controls">
          <button class="score-btn minus" onclick="changeScore(1,-1)">−</button>
          <div class="score-display" id="sd1">${editScore1}</div>
          <button class="score-btn plus" onclick="changeScore(1,1)">+</button>
        </div>
      </div>
      <div class="score-vs">vs</div>
      <div class="score-entry-team">
        <div class="score-entry-team-dot" style="background:${c2}"></div>
        <div class="score-entry-team-name">${escHtml(t2?.name||'?')}</div>
        <div class="score-controls">
          <button class="score-btn minus" onclick="changeScore(2,-1)">−</button>
          <div class="score-display" id="sd2">${editScore2}</div>
          <button class="score-btn plus" onclick="changeScore(2,1)">+</button>
        </div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="input-label"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><circle cx="12" cy="12" r="10"/><path d="M12 7l3 2.2-1.15 3.5h-3.7L9 9.2 12 7z"/><path d="M12 2v5M20.5 8.5L15 9.8M18.5 19.5l-4-5.8M5.5 19.5l4-5.8M3.5 8.5L9 9.8"/></svg> Goleadores</div>
    <div style="display:flex;gap:8px;align-items:flex-start">
      ${scorerCol(match.team1Id, t1, c1)}
      ${scorerCol(match.team2Id, t2, c2)}
    </div>
    <div class="divider"></div>
    <div class="input-label"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> Tarjeta Espíritu Super Campeones</div>
    <div class="espiritu-options">${espHtml}</div>
    <div class="divider"></div>
    <div class="input-group">
      <label class="input-label"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg> Notas</label>
      <textarea class="input" id="match-notes" placeholder="Observaciones del partido..." oninput="editNotes=this.value">${escHtml(editNotes)}</textarea>
    </div>`;
}

function changeScore(team, delta) {
  if (team === 1) { editScore1 = Math.max(0, editScore1 + delta); document.getElementById('sd1').textContent = editScore1; }
  else { editScore2 = Math.max(0, editScore2 + delta); document.getElementById('sd2').textContent = editScore2; }
}

function _refreshMatchEntry() {
  const cat = getActiveCategory();
  let match = null;
  if (currentMatchType === 'ko') match = findKnockoutMatch(cat, currentMatchId);
  else for (const g of cat.groups) for (const r of g.rounds) for (const m of r.matches) if (m.id === currentMatchId) { match = m; break; }
  if (match) { const t1 = getTeamById(match.team1Id, cat), t2 = getTeamById(match.team2Id, cat); renderMatchEntryBody(cat, match, t1, t2); }
}

function removeScorer(idx) {
  editScorers.splice(idx, 1);
  _refreshMatchEntry();
}
function addGoalToScorer(encodedName, teamId) {

// Registra un nombre en el roster del equipo (sin duplicados, case-insensitive)
function registerPlayer(teamId, name) {
  const trimmed = (name || '').trim();
  if (!trimmed) return;
  const cat = getActiveCategory();
  if (!cat) return;
  const team = cat.teams.find(t => t.id === teamId);
  if (!team) return;
  if (!Array.isArray(team.roster)) team.roster = [];
  const lower = trimmed.toLowerCase();
  if (!team.roster.some(p => p.toLowerCase() === lower)) {
    team.roster.push(trimmed);
    saveState(); // persiste el roster de inmediato
  }
}

function saveMatchResult(matchId, type) {
  const cat = getActiveCategory();
  editNotes = document.getElementById('match-notes')?.value || editNotes;
  let match = null;
  if (type === 'ko') {
    match = findKnockoutMatch(cat, matchId);
  } else {
    for (const g of cat.groups) for (const r of g.rounds) for (const m of r.matches) if (m.id === matchId) { match = m; break; }
  }
  if (!match) return;
  match.score1   = editScore1;
  match.score2   = editScore2;
  match.scorers  = editScorers;
  match.espiritu = editEspiritu;
  match.notes    = editNotes;
  match.played   = true;
  // ── Auditoría: quién y cuándo ──
  match.editedBy = isPlanillero() ? (currentPlanillero || 'Planillero') : 'Admin';
  match.editedAt = new Date().toISOString();
  if (type === 'ko') advanceKnockout(cat, match);
  saveMatchPatch(match);
  saveState();
  closeModal();
  renderPage();
}

function clearMatchResult(matchId, type) {
  const cat = getActiveCategory();
  let match = null;
  if (type === 'ko') match = findKnockoutMatch(cat, matchId);
  else for (const g of cat.groups) for (const r of g.rounds) for (const m of r.matches) if (m.id === matchId) { match = m; break; }
  if (!match) return;
  match.score1 = null; match.score2 = null; match.scorers = []; match.espiritu = null; match.notes = ''; match.played = false;
  match.editedBy = null; match.editedAt = null;
  saveMatchPatch(match);
  saveState(); closeModal(); renderPage();
}

function handleRosterFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const workbook = XLSX.read(e.target.result, { type: 'array' });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
      let added = 0, skipped = 0;
      rows.forEach((row, idx) => {
        const col0 = String(row[0] || '').trim();
        const col1 = String(row[1] || '').trim();
        // Saltar fila de encabezado si la primera celda parece un título
        if (idx === 0 && /^(nombre|jugador|apellido|player|name)/i.test(col0)) return;
        if (!col0) return;
        const fullName = col1 ? `${col0} ${col1}` : col0;
        const lower = fullName.toLowerCase();
        const currentRoster = editingTeamId
          ? (getTeamById(editingTeamId)?.roster || [])
          : _pendingRoster;
        if (currentRoster.some(p => p.toLowerCase() === lower)) { skipped++; return; }
        if (editingTeamId) {
          registerPlayer(editingTeamId, fullName);
        } else {
          _pendingRoster.push(fullName);
        }
        added++;
      });
      renderRosterList();
      const fb = document.getElementById('roster-import-feedback');
      if (fb) {
        fb.textContent = added > 0
          ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg> ${added} jugador${added !== 1 ? 'es' : ''} importado${added !== 1 ? 's' : ''}${skipped > 0 ? ` · ${skipped} ya existían` : ''}`
          : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> No se importaron jugadores nuevos (${skipped} ya existían)`;
        setTimeout(() => { if (fb) fb.textContent = ''; }, 4000);
      }
    } catch(err) {
      alert('Error al leer el archivo. Asegúrate de que sea un Excel (.xlsx) o CSV válido.');
      console.error('Roster import error:', err);
    }
    input.value = '';
  };
  reader.readAsArrayBuffer(file);
}

function openGenerateFixtureModal() {
