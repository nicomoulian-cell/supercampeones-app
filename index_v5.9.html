function renderGroupAssignmentModal() {
  const cat = getActiveCategory();
  const n = cat.teams.length;
  const numGroups = Math.floor(n / 4);
  const groupNames = Array.from({length: numGroups}, (_, i) => String(i + 1));

  // Count teams per group
  const groupMap = {};
  groupNames.forEach(g => groupMap[g] = []);
  Object.entries(window._groupAssignments).forEach(([tid, g]) => {
    if (groupMap[g]) groupMap[g].push(tid);
  });

  const canGenerate = groupNames.every(g => groupMap[g].length === 4);
  const remainder = n % 4;

  document.getElementById('modal-title').innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> Armar Grupos';
  document.getElementById('modal-footer').classList.add('hidden');

  const teamRows = cat.teams.map(t => {
    const assigned = window._groupAssignments[t.id] || groupNames[0];
    const init = t.name.trim().split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
    return `
      <div class="team-item" style="margin-bottom:6px;--team-color:${t.color||'var(--green)'}">
        <div class="team-avatar" style="background:${t.color||'var(--green)'}">${init}</div>
        <div class="team-info">
          <div class="team-name-text">${escHtml(t.name)}</div>
          ${t.players ? `<span class="team-meta" style="display:inline-flex;align-items:center;gap:3px">${SVG_USERS} ${t.players}</span>` : ''}
        </div>
        <div style="padding-right:12px;flex-shrink:0">
          <select class="input" style="width:auto;min-width:90px;padding:6px 28px 6px 10px;font-size:13px;font-weight:700"
            onchange="assignTeamToGroup('${t.id}',this.value)">
            ${groupNames.map(g => `<option value="${g}" ${assigned===g?'selected':''}>Grupo ${g}</option>`).join('')}
          </select>
        </div>
      </div>`;
  }).join('');

  const groupPreview = groupNames.map(g => {
    const teams = groupMap[g].map(tid => {
      const t = cat.teams.find(x => x.id === tid);
      return t ? `<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:50%;background:${t.color};display:inline-block"></span>${escHtml(t.name)}</span>` : '';
    }).join(' · ');
    const count = groupMap[g].length;
    const ok = count === 4;
    return `<div style="display:flex;align-items:baseline;gap:8px;padding:8px 10px;border-radius:8px;margin-bottom:6px;background:${ok?'#eafaf1':'#fef9e7'};border:1.5px solid ${ok?'#27ae60':'#e8a020'}">
      <span style="font-weight:900;font-size:13px;color:${ok?'#1a7a4a':'#7d6500'};white-space:nowrap">Grupo ${g} ${ok?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg>':'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>'} ${count}/4</span>
      <span style="font-size:12px;color:#555;flex:1">${teams || '<em>Sin equipos</em>'}</span>
    </div>`;
  }).join('');

  // Cancha + horario config
  const selectedTime = window._fixtureConfig?.startTime || '8:30';
  const horarios = ['8:30', '11:30'];
  const courtCards = groupNames.map(g => `
    <div style="flex:1;background:var(--green-pale);border:2px solid var(--green);border-radius:var(--radius-sm);padding:12px 10px;text-align:center">
      <div style="font-size:22px;margin-bottom:4px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="12" y1="4" x2="12" y2="20"/><path d="M9 12a3 3 0 0 0 6 0"/></svg>️</div>
      <div style="font-size:13px;font-weight:900;color:var(--green-dark)">Cancha ${g}</div>
      <div style="font-size:11px;color:var(--text-light);margin-top:2px;font-weight:600">Grupo ${g}</div>
    </div>`).join('');
  const horarioChips = horarios.map(h => `
    <div onclick="setFixtureHorario('${h}')"
      style="flex:1;padding:12px 8px;border-radius:var(--radius-sm);text-align:center;cursor:pointer;font-weight:800;font-size:14px;transition:all 0.18s;
        ${selectedTime===h
          ? 'background:var(--green);color:white;border:2px solid var(--green);box-shadow:var(--shadow-green)'
          : 'background:white;color:var(--text-light);border:2px solid var(--border)'}">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> ${h} hrs
    </div>`).join('');

  document.getElementById('modal-body').innerHTML = `
    ${remainder !== 0 ? `<div class="alert alert-danger" style="margin-bottom:12px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Con ${n} equipos no se pueden armar grupos exactos de 4. Se necesita un múltiplo de 4 (4, 8, 12, 16, 20...).</div>` : ''}

    <div class="input-label" style="margin-bottom:8px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="12" y1="4" x2="12" y2="20"/><path d="M9 12a3 3 0 0 0 6 0"/></svg>️ Número de Canchas</div>
    <div style="display:flex;gap:8px;margin-bottom:4px">${courtCards}</div>
    <div style="font-size:12px;color:var(--text-light);margin-bottom:14px;margin-top:6px">
      Cada grupo juega en su propia cancha — <strong>${numGroups} cancha${numGroups>1?'s':''}</strong> para ${n} equipos.
    </div>

    <div class="divider"></div>
    <div class="input-label" style="margin-bottom:8px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Horario de Inicio</div>
    <div style="display:flex;gap:8px;margin-bottom:16px">${horarioChips}</div>

    <div class="divider"></div>
    <div class="input-label" style="margin-bottom:8px">Equipos → Grupo</div>
    ${teamRows}
    <div class="divider"></div>
    <div class="input-label" style="margin-bottom:8px">Resumen de Grupos</div>
    ${groupPreview}
    <button class="btn btn-primary btn-full" style="margin-top:8px;${canGenerate?'':'opacity:0.45;cursor:not-allowed'}"
      ${canGenerate?`onclick="confirmGenerateFixture()"`:'disabled'}>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg> ${canGenerate ? 'Confirmar grupos' : 'Completa los grupos (4 equipos c/u)'}
    </button>`;
}

function assignTeamToGroup(teamId, groupName) {
  window._groupAssignments[teamId] = groupName;
  renderPage();
}

function setCourtName(groupName, value) {
  window._fixtureConfig = window._fixtureConfig || {};
  if (!window._fixtureConfig.courtNames) window._fixtureConfig.courtNames = {};
  window._fixtureConfig.courtNames[groupName] = value.trim();
  // No re-render — el input mantiene su propio estado
}

function setFixtureHorario(time) {
  window._fixtureConfig = window._fixtureConfig || {};
  window._fixtureConfig.startTime = time;
  renderPage();
}

function confirmGenerateFixture() {
  const cat = getActiveCategory();
  const n = cat.teams.length;
  const numGroups = Math.floor(n / 4);
  const groupNames = Array.from({length: numGroups}, (_, i) => String(i + 1));
  const groupMap = {};
  groupNames.forEach(g => groupMap[g] = []);
  Object.entries(window._groupAssignments).forEach(([tid, g]) => { if (groupMap[g]) groupMap[g].push(tid); });
  // Validate
  for (const g of groupNames) {
    if (groupMap[g].length !== 4) { alert(`El Grupo ${g} no tiene 4 equipos`); return; }
  }
  // Solo crear grupos (sin rounds aún — el fixture se genera desde la pestaña Grupos)
  const courtNames = window._fixtureConfig?.courtNames || {};
  cat.groups = groupNames.map(g => {
    const teamIds = groupMap[g];
    // Leer el input directamente por si el usuario tipió pero no disparó oninput
    const inputEl = document.getElementById('court-name-' + g);
    const cancha = (inputEl?.value.trim()) || courtNames[g] || g;
    return { id: uuid(), name: 'Grupo ' + g, cancha, teamIds, rounds: [] };
  });
  cat.fixtureGenerated = false;
  cat.knockout = null;
  cat.fixtureConfig = {
    courts: numGroups,
    startTime: window._fixtureConfig?.startTime || '8:30',
    courtNames
  };
  saveState(); closeModal();
  // Ir directo a la pestaña Grupos
  navigate('grupos');
}

function openEditarGruposModal() {
  const cat = getActiveCategory();
  if (!cat) return;

  // Detectar si hay resultados jugados
  const hasResults = (cat.groups || []).some(g =>
    g.rounds?.some(r => r.matches?.some(m => m.played))
  );

  const numGroups = cat.groups.length;
  const groupNames = cat.groups.map(g => g.name.replace('Grupo ', ''));

  // Pre-cargar asignaciones actuales
  window._editGruposAssignments = {};
  cat.groups.forEach(g => {
    g.teamIds.forEach(tid => {
      window._editGruposAssignments[tid] = g.name.replace('Grupo ', '');
    });
  });

  function renderModalBody() {
    const assignments = window._editGruposAssignments;
    const groupMap = {};
    groupNames.forEach(g => groupMap[g] = []);
    Object.entries(assignments).forEach(([tid, g]) => { if (groupMap[g]) groupMap[g].push(tid); });

    const warningHtml = hasResults
      ? `<div class="alert alert-warning" style="margin-bottom:14px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Hay resultados jugados. Si cambias los grupos, <strong>se perderán todos los resultados</strong> y el fixture se regenerará.</div>`
      : '';

    const groupsHtml = groupNames.map(gn => {
      const teams = (groupMap[gn] || []).map(tid => {
        const team = cat.teams.find(t => t.id === tid);
        if (!team) return '';
        const otherGroups = groupNames.filter(g => g !== gn);
        const options = otherGroups.map(og => `<option value="${og}">→ Grupo ${og}</option>`).join('');
        return `<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)">
          <span style="width:10px;height:10px;border-radius:50%;background:${team.color||'#ccc'};flex-shrink:0"></span>
          <span style="flex:1;font-size:13px;font-weight:600">${escHtml(team.name)}</span>
          <select style="font-size:12px;padding:3px 6px;border-radius:6px;border:1px solid var(--border);background:white;cursor:pointer"
            onchange="window._editGruposAssignments['${tid}']=this.value;document.getElementById('egrp-body').innerHTML=renderEditGruposBody()">
            <option value="${gn}">Grupo ${gn}</option>
            ${options}
          </select>
        </div>`;
      }).join('');
      const count = (groupMap[gn]||[]).length;
      const ok = count === 4;
      return `<div style="margin-bottom:12px">
        <div style="font-weight:800;font-size:13px;color:${ok?'var(--green-dark)':'#92400e'};margin-bottom:6px;display:flex;align-items:center;gap:6px">
          <span style="width:8px;height:8px;border-radius:50%;background:${ok?'var(--green)':'var(--gold-bright)'}"></span>
          Grupo ${gn} <span style="font-weight:500;color:var(--text-light)">(${count}/4)</span>
        </div>
        ${teams}
      </div>`;
    }).join('');

    return warningHtml + groupsHtml;
  }

  // Exponer para el onchange inline
  window.renderEditGruposBody = renderModalBody;

  openModal();
  document.getElementById('modal-title').innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0;margin-right:5px"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>Editar Grupos';
  document.getElementById('modal-body').innerHTML = `<div id="egrp-body">${renderModalBody()}</div>`;
  document.getElementById('modal-footer').classList.remove('hidden');
  document.getElementById('modal-footer').innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="confirmarEditarGrupos()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg> Confirmar y regenerar fixture</button>`;
}

function confirmarEditarGrupos() {
  const cat = getActiveCategory();
  if (!cat) return;

  const hasResults = (cat.groups || []).some(g =>
    g.rounds?.some(r => r.matches?.some(m => m.played))
  );
  if (hasResults && !confirm('¿Confirmar? Se perderán todos los resultados jugados.')) return;

  const assignments = window._editGruposAssignments;
  const groupNames = cat.groups.map(g => g.name.replace('Grupo ', ''));

  // Reconstruir teamIds por grupo manteniendo nombre y cancha
  cat.groups.forEach(g => {
    const gn = g.name.replace('Grupo ', '');
    g.teamIds = Object.entries(assignments)
      .filter(([, assigned]) => assigned === gn)
      .map(([tid]) => tid);
    // Regenerar partidos
    g.rounds = generateRoundRobinRounds(g.teamIds);
  });

  cat.knockout = null;
  cat.fixtureGenerated = true;
  saveState();
  closeModal();
  navigate('grupos');
}

function editGrupos() {
  const cat = getActiveCategory();
  if (!cat) return;
  // Pre-cargar asignaciones actuales para que no se pierdan al editar
  window._groupAssignments = {};
  cat.groups.forEach(group => {
    group.teamIds.forEach(tid => { window._groupAssignments[tid] = group.name.replace('Grupo ', ''); });
  });
  window._fixtureConfig = {
    startTime: cat.fixtureConfig?.startTime || '8:30',
    courtNames: { ...(cat.fixtureConfig?.courtNames || {}) }
  };
  cat.groups = [];
  saveState(); renderPage();
}

function createFixture() {
  const cat = getActiveCategory();
  if (!cat || !cat.groups || cat.groups.length === 0) return;
  if (!confirm('¿Crear el fixture? Se generarán los partidos para todos los grupos.')) return;
  cat.groups.forEach(group => {
    group.rounds = generateRoundRobinRounds(group.teamIds);
  });
  cat.fixtureGenerated = true;
  saveState(); navigate('fixture');
}

function deleteFixture() {
  if (!confirm('¿Eliminar el fixture y todos los resultados? Esta acción no se puede deshacer.')) return;
  const cat = getActiveCategory();
  cat.groups = []; cat.knockout = null; cat.fixtureGenerated = false;
  saveState(); renderPage();
}

// Utilidades de color para el template de exportación
function _expBlend(hex, factor) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.round(r*factor)},${Math.round(g*factor)},${Math.round(b*factor)})`;
}
function _expLighten(hex, factor) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.round(r+(255-r)*factor)},${Math.round(g+(255-g)*factor)},${Math.round(b+(255-b)*factor)})`;
}

function openExportFixtureModal() {
  const cat = getActiveCategory();
  const tour = getActiveTournament();
  if (!cat || !cat.fixtureGenerated) { alert('Primero genera el fixture.'); return; }

    <div class="input-group">
      <label class="input-label">Encabezado de fecha</label>

        value="${escHtml(['FX', tour.name, tour.date, cat.name].filter(Boolean).join(' - '))}"
        placeholder="ej: FX - SuperCampeones - 7 Junio 2026 - Sub-10">
    </div>
    <button class="btn btn-primary btn-full" id="exp-btn" onclick="generateFixtureXLSX()" style="margin-top:4px">
      Exportar Fixture
    </button>
    <div id="exp-status" style="font-size:12px;color:var(--text-light);text-align:center;margin-top:8px;min-height:18px"></div>`;
  openModal();
  setTimeout(() => document.getElementById('exp-fecha')?.focus(), 300);
}

function generateFixtureXLSX() {
  const cat = getActiveCategory();
  const tour = getActiveTournament();
  const fechaLabel = document.getElementById('exp-fecha')?.value.trim() || '';
  const startTime = cat.fixtureConfig?.startTime || '8:30';

  // Construir filas del sheet
  const rows = [];

  // Encabezado del torneo
  rows.push([tour.name || 'Torneo', '', cat.name || 'Categoría', '', fechaLabel]);
  rows.push([]); // línea vacía

  for (const group of cat.groups) {
    const canchaName = group.cancha || group.name.replace('Grupo ','');
    rows.push([`CANCHA ${canchaName}`]);
    rows.push(['Equipo Local', '', 'Equipo Visitante', 'Horario']);

    group.rounds.forEach((round, ri) => {
      round.matches.forEach((match, mi) => {
        const t1 = getTeamById(match.team1Id, cat);
        const t2 = getTeamById(match.team2Id, cat);
        const time = getMatchTime(startTime, ri, mi) || '';
        rows.push([t1?.name || '?', 'vs', t2?.name || '?', time]);
      });
    });

    rows.push([]); // separador entre canchas
  }

  const ws = XLSX.utils.aoa_to_sheet(rows);

  // Ancho de columnas
  ws['!cols'] = [{ wch: 28 }, { wch: 5 }, { wch: 28 }, { wch: 10 }];

  const wb = XLSX.utils.book_new();
  const sheetName = (cat.name || 'Fixture').slice(0, 31);
  XLSX.utils.book_append_sheet(wb, ws, sheetName);

  const filename = `fixture-${(cat.name||'cat').replace(/\s+/g,'-').toLowerCase()}.xlsx`;
  XLSX.writeFile(wb, filename);

  const status = document.getElementById('exp-status');
  if (status) { status.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg> ¡Excel descargado!'; setTimeout(() => { if(status) status.innerHTML=''; }, 3000); }
}

/* ═══════════════════════ DELETE CATEGORY ═══════════════════════ */
function deleteCategory(catId) {
  if (!confirm('¿Eliminar esta categoría y todos sus datos?')) return;
  const tour = getActiveTournament();
  if (!tour) return;
  tour.categories = (tour.categories || []).filter(c => c.id !== catId);
  if (state.activeCategoryId === catId) state.activeCategoryId = tour.categories[0]?.id || null;
  saveState(); renderPage();
}

/* ═══════════════════════ GENERATE KNOCKOUT ═══════════════════════ */
function deleteKnockout() {
  if (!confirm('¿Eliminar la fase eliminatoria y todos sus resultados?')) return;
  const cat = getActiveCategory();
  cat.knockout = null;
  saveState(); renderPage();
}

function generateKnockout() {
  const cat = getActiveCategory();
  if (!cat) return;
  const qualifiers = getQualifiers(cat);
  if (qualifiers.length < 2) { alert('No hay suficientes clasificados'); return; }
  cat.knockout = generateKnockoutStructure(qualifiers);
  saveState(); renderPage();
}

function handleModalClick(e) { if (e.target.id === 'modal') closeModal(); }

function bindEvents() {

}
