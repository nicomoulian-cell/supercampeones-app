/* ═══════════════════════ HUB DE TORNEOS ═══════════════════════ */
function _getTourStatus(tour) {
  if (tour.status === 'finished') return 'finished';
  if (!tour.date) return 'upcoming';
  const today = new Date(); today.setHours(0,0,0,0);
  const iso = _dateToIso(tour.date);
  if (!iso) return 'upcoming';
  const tourDate = new Date(iso + 'T00:00:00');
  if (tourDate > today) return 'upcoming';
  // fecha pasada o hoy — si tiene partidos jugados es "activo"
  const hasPlayed = (tour.categories||[]).some(cat =>
    (cat.groups||[]).some(g => (g.rounds||[]).some(r => (r.matches||[]).some(m => m.played)))
  );
  return hasPlayed ? 'active' : 'upcoming';
}

function _tourStatusLabel(s) {
  if (s === 'active')   return '<span class="hub-badge hub-badge-active">● En curso</span>';
  if (s === 'finished') return '<span class="hub-badge hub-badge-finished">Finalizado</span>';
  return '';
}

let _hubShowAllFinished = false;
let _hubSearch = '';
let _fixtureSearch = '';
let _resultadosSearch = '';

function _hubSearchInput(el) {
  _hubSearch = el.value;
  // Solo actualizar resultados — el input NO se toca, mantiene foco y cursor
  const results = document.getElementById('hub-results');
  if (results) results.innerHTML = _buildHubResults(_hubSearch);
  _renderHubSuggestions(_hubSearch);
}

function _renderHubSuggestions(q) {
  const wrap = document.querySelector('.hub-search-wrap');
  if (!wrap) return;
  const old = wrap.querySelector('.hub-suggestions');
  if (old) old.remove();
  if (!q) return;
  const matches = state.tournaments.filter(t =>
    t.name.toLowerCase().includes(q.toLowerCase()) ||
    (t.date||'').toLowerCase().includes(q.toLowerCase())
  ).slice(0, 6);
  if (!matches.length) return;
  const div = document.createElement('div');
  div.className = 'hub-suggestions';
  div.innerHTML = matches.map(t => {
    const st = _getTourStatus(t);
    const badge = st === 'active' ? '● En curso' : st === 'upcoming' ? 'Próximo' : 'Finalizado';
    return `<div class="hub-suggestion-item"
      onmousedown="event.preventDefault();_hubPickSuggestion('${t.id}')">
      <span class="hub-suggestion-dot" style="background:${t.color||'var(--green)'}"></span>
      <span class="hub-suggestion-name">${escHtml(t.name)}</span>
      ${t.date ? `<span class="hub-suggestion-meta">${escHtml(t.date)}</span>` : ''}
      <span class="hub-suggestion-meta">${badge}</span>
    </div>`;
  }).join('');
  wrap.appendChild(div);
}

function _hubPickSuggestion(id) {
  _hubSearch = '';
  const inp = document.querySelector('.hub-search');
  if (inp) inp.value = '';
  const s = document.querySelector('.hub-suggestions');
  if (s) s.remove();
  enterTournament(id);
}

function _hubSearchBlur() {
  setTimeout(() => {
    const s = document.querySelector('.hub-suggestions');
    if (s) s.remove();
  }, 150);
}

function _hubTourCard(t) {
  const st = _getTourStatus(t);
  const color = t.color || '#94a3b8';
  const cats = t.categories || [];
  const teamCount = cats.reduce((sum, c) => sum + (c.teams||[]).length, 0);

  // Progreso de partidos
  let totalM = 0, playedM = 0;
  cats.forEach(c => (c.groups||[]).forEach(g => (g.rounds||[]).forEach(r => r.matches.forEach(m => { totalM++; if(m.played) playedM++; }))));
  const pct = totalM ? Math.round(playedM/totalM*100) : 0;

  const initials = t.name.trim().split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase();

  const badgeHtml = st === 'active'
    ? `<span class="hub-card-badge active"><svg width="7" height="7" viewBox="0 0 8 8"><circle cx="4" cy="4" r="4" fill="white"/></svg>En curso</span>`
    : st === 'upcoming'
    ? `<span class="hub-card-badge upcoming">Próximo</span>`
    : '';

  const SVG_CAL = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;
  const SVG_USERS = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`;

  const metaParts = [];
  if (t.date) metaParts.push(`${SVG_CAL} ${escHtml(t.date)}`);
  if (teamCount) metaParts.push(`${SVG_USERS} ${teamCount}`);

  const progressHtml = totalM > 0 ? `
    <div style="margin-top:3px">
      <div class="hub-card-progress"><div class="hub-card-progress-fill" style="width:${pct}%"></div></div>
    </div>` : '';

  const topStyle = `background:linear-gradient(145deg, ${color} 0%, ${color}bb 100%)`;

  return `<div class="hub-card" onclick="enterTournament('${t.id}')">
    <div class="hub-card-top" style="${topStyle}">
      <div class="hub-card-initial">${initials}</div>
      ${badgeHtml}
      <div class="hub-card-name">${escHtml(t.name)}</div>
    </div>
    <div class="hub-card-bottom">
      <div style="min-width:0;flex:1">
        <div class="hub-card-meta" style="flex-wrap:nowrap;overflow:hidden">${metaParts.join('<span class="hub-card-meta-sep" style="margin:0 2px">·</span>') || '<span style="opacity:0.5">Sin datos</span>'}</div>
        ${progressHtml}
      </div>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
    ${isAdmin() ? `<button class="hub-card-edit" onclick="event.stopPropagation();openEditTournamentModal('${t.id}')" title="Editar"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></button>` : ''}
  </div>`;
}

function _buildHubResults(q) {
  const ql = (q||'').toLowerCase();
  let tours = state.tournaments.slice().filter(t =>
    !ql || t.name.toLowerCase().includes(ql) || (t.date||'').toLowerCase().includes(ql)
  );
  const active   = tours.filter(t => _getTourStatus(t) === 'active');
  const upcoming = tours.filter(t => _getTourStatus(t) === 'upcoming');

  // Planilleros y apoderados sólo ven torneos en curso y próximos — no finalizados
  const showFinished = isAdmin();
  const finished = showFinished
    ? tours.filter(t => _getTourStatus(t) === 'finished')
        .sort((a, b) => {
          const months = {Ene:0,Feb:1,Mar:2,Abr:3,May:4,Jun:5,Jul:6,Ago:7,Sep:8,Oct:9,Nov:10,Dic:11};
          const parseDate = d => {
            if (!d) return 0;
            const m = d.match(/(\d{1,2})\s+(\w{3})\s+(\d{4})/);
            if (m) return new Date(+m[3], months[m[2]]??0, +m[1]).getTime();
            const p = new Date(d); return isNaN(p) ? 0 : p.getTime();
          };
          return parseDate(b.date) - parseDate(a.date);
        })
    : [];

  let html = '';
  const liveCards = [...active, ...upcoming];
  if (liveCards.length) {
    const label = active.length && upcoming.length ? 'Activos & Próximos'
      : active.length ? 'En curso' : 'Próximos';
    html += `<div class="hub-section-label">${label}</div>`;
    html += `<div class="hub-cards-grid">${liveCards.map(_hubTourCard).join('')}</div>`;
  }
  if (finished.length) {
    const shown = _hubShowAllFinished ? finished : finished.slice(0, 8);
    html += `<div class="hub-section-label" style="display:flex;align-items:center;justify-content:space-between">
      <span>Finalizados</span>
      ${finished.length > 8 ? `<button class="hub-finished-toggle" onclick="_hubShowAllFinished=!_hubShowAllFinished;document.getElementById('hub-results').innerHTML=_buildHubResults(_hubSearch)">${_hubShowAllFinished?'▲ Ver menos':'▼ Ver todos ('+finished.length+')'}</button>` : ''}
    </div>`;
    html += `<div class="hub-cards-grid finished">${shown.map(_hubTourCard).join('')}</div>`;
  }
  if (!liveCards.length && !finished.length) {
    const msg = ql
      ? `Sin resultados para "${escHtml(q)}".`
      : isAdmin()
        ? 'No hay torneos aún.<br>Crea el primero con el botón <strong>+ Nuevo</strong>.'
        : 'No hay torneos en curso.';
    html += `<div class="hub-empty">${msg}</div>`;
  }
  return html;
}

function enterTournament(id) {
  const tour = getTournamentById(id);
  // Planilleros y apoderados no pueden entrar a torneos finalizados
  if (!isAdmin() && _getTourStatus(tour) === 'finished') {
    showToast('Este torneo ya finalizó');
    return;
  }
  state.activeTournamentId = id;
  state.activeCategoryId = (tour?.categories?.length > 0) ? tour.categories[0].id : null;
  applyTournamentTheme(tour?.color || null);
  saveState();
  navigate(isAdmin() ? 'equipos' : 'fixture');
}

function renderHeader() {
  const tour = getActiveTournament();
  const isHub   = currentPage === 'hub';
  const isAdmin_ = currentPage === 'admin';
  const tourSel = document.getElementById('tour-selector');
  const catSel  = document.getElementById('cat-selector');
  const headerEl = document.getElementById('header');
  if (headerEl) {
    headerEl.classList.toggle('header-hub', isHub || isAdmin_);
    headerEl.classList.toggle('header-admin', isAdmin_); // diferencia admin de hub puro en CSS
  }

  if (isHub || isAdmin_ || !tour) {
    // Hub: sin back button; Admin: muestra botón volver a Torneos
    tourSel.innerHTML = isAdmin_ ? `
      <button class="header-back" onclick="goToHub()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        Torneos
      </button>` : '';
    catSel.innerHTML  = '';
    const tourNameElHub = document.getElementById('tour-name-header');
    if (tourNameElHub) tourNameElHub.style.display = 'none';
  } else {
    // Botón Torneos a la izquierda en tourSel
    tourSel.innerHTML = `
      <button class="header-back" onclick="goToHub()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        Torneos
      </button>`;
    // Nombre del torneo + fecha centrados bajo el logo
    const tourNameEl = document.getElementById('tour-name-header');
    if (tourNameEl) {
      tourNameEl.style.display = 'flex';
      document.getElementById('tour-name-text').textContent = tour.name;
      const dateEl = document.getElementById('tour-date-text');
      dateEl.textContent = tour.date ? `· ${tour.date}` : '';
    }

    // Chips de categoría
    let html = '';
    for (const cat of (tour.categories || [])) {
      html += `<div class="cat-chip${cat.id === state.activeCategoryId?' active':''}" onclick="selectCategory('${cat.id}')">${escHtml(cat.name)}</div>`;
    }
    if (isAdmin()) html += '<div class="cat-chip cat-chip-add" onclick="openAddCategoryModal()">+ Categoría</div>';
    catSel.innerHTML = html;
  }

  // Bloquear nav cuando no hay torneo activo (sin excepción para admin)
  const navIds = ['nav-equipos','nav-grupos','nav-fixture','nav-resultados','nav-posiciones'];
  navIds.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('disabled', !tour);
  });

  // Badge de torneo — solo visible para Admin
  const badge = document.getElementById('header-badge');
  const cat = getActiveCategory();
  if (!isAdmin() && !isAdmin_) {
    // Apoderado y Planillero: sin badge
    badge.textContent = '';
    badge.className   = '';
    badge.style.display = 'none';
  } else {
    badge.style.display = '';
    if (isAdmin_) {
      badge.textContent = 'Panel Admin';
      badge.className = 'tag tag-gold';
    } else if (isHub || !tour) {
      badge.textContent = state.tournaments.length + ' torneo' + (state.tournaments.length!==1?'s':'');
      badge.className = 'tag tag-gray';
    } else if (cat) {
      const n = cat.teams.length;
      badge.textContent = n + ' equipo' + (n!==1?'s':'');
      badge.className = 'tag ' + (cat.fixtureGenerated ? 'tag-green' : 'tag-gold');
    } else {
      const nc = (tour.categories||[]).length;
      badge.textContent = nc + ' cat.'; badge.className = 'tag tag-gold';
    }
  }

  // Botón de perfil
  const wrap = document.getElementById('profile-btn-wrap');
  if (wrap) {
    if (currentRole === 'planillero') {
      const initial = (currentPlanillero || 'P').charAt(0).toUpperCase();
      wrap.innerHTML = `<button class="profile-btn profile-btn-planillero" onclick="_toggleProfileMenu(event)" title="${escHtml(currentPlanillero||'Planillero')}">${initial}</button>`;
    } else if (currentRole === 'admin') {
      wrap.innerHTML = `<button class="profile-btn profile-btn-admin" onclick="_toggleProfileMenu(event)" title="Admin">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </button>`;
    } else {
      wrap.innerHTML = `<button class="profile-btn" onclick="_toggleProfileMenu(event)" title="Perfil">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </button>`;
    }
  }
  // Actualizar --header-height tras el reflow real del header (controla el top de #scroll-root)
  requestAnimationFrame(() => requestAnimationFrame(() => {
    const hdr = document.getElementById('header');
    if (hdr) document.documentElement.style.setProperty('--header-height', hdr.offsetHeight + 'px');
  }));
}

/* ═══════════════════════ TOURNAMENT THEME ═══════════════════════ */
function _hexToRgb(hex) {
  const h = hex.replace('#','');
  return { r: parseInt(h.slice(0,2),16), g: parseInt(h.slice(2,4),16), b: parseInt(h.slice(4,6),16) };
}
function _toHex(r,g,b) {
  return '#'+[r,g,b].map(v => Math.min(255,Math.max(0,Math.round(v))).toString(16).padStart(2,'0')).join('');
}
function applyTournamentTheme(color) {
  const root = document.documentElement;
  if (!color) {
    root.style.setProperty('--green',       '#16a34a');
    root.style.setProperty('--green-dark',  '#14532d');
    root.style.setProperty('--green-mid',   '#22c55e');
    root.style.setProperty('--green-pale',  '#dcfce7');
    root.style.setProperty('--shadow-green','0 4px 20px rgba(22,163,74,0.25)');
    return;
  }
  const {r,g,b} = _hexToRgb(color);
  // dark: 60% brightness
  const dark = _toHex(r*0.6, g*0.6, b*0.6);
  // mid: 70% color + 30% white (lighter, for gradients)
  const mid  = _toHex(r*0.7+255*0.3, g*0.7+255*0.3, b*0.7+255*0.3);
  // pale: 12% color + 88% white (tinted background)
  const pale = _toHex(r*0.12+255*0.88, g*0.12+255*0.88, b*0.12+255*0.88);
  root.style.setProperty('--green',       color);
  root.style.setProperty('--green-dark',  dark);
  root.style.setProperty('--green-mid',   mid);
  root.style.setProperty('--green-pale',  pale);
  root.style.setProperty('--shadow-green',`0 4px 20px rgba(${r},${g},${b},0.3)`);
}

function _formatTourDate(iso) {
  if (!iso) return '';
  const [y,m,d] = iso.split('-');
  const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
}
function addTournament() {
  const name  = document.getElementById('new-tour-name')?.value.trim();
  const color = document.getElementById('new-tour-color')?.value || '#0093d8';
  const rawDate = document.getElementById('new-tour-date')?.value || '';
  const date  = _formatTourDate(rawDate);
  if (!name) { alert('Selecciona una copa para el torneo'); return; }

  const doClone   = document.getElementById('clone-check')?.checked;
  const sourceId  = document.getElementById('clone-source')?.value;
  const withTeams = document.getElementById('clone-teams')?.checked ?? true;

  let categories = [];
  if (doClone && sourceId) {
    const source = getTournamentById(sourceId);
    if (source) categories = _cloneCategories(source.categories || [], withTeams);
  }

  const tour = { id: uuid(), name, color, date, categories };
  state.tournaments.push(tour);
  saveState(); closeModal();
  enterTournament(tour.id);
}

function _cloneCategories(cats, withTeams) {
  return cats.map(cat => {
    const newCat = {
      id: uuid(),
      name: cat.name,
      teams: [],
      groups: [],
      fixtureGenerated: false,
      fixtureConfig: cat.fixtureConfig ? { ...cat.fixtureConfig } : null
    };
    if (withTeams) {
      newCat.teams = (cat.teams || []).map(t => ({
        id: uuid(),
        name: t.name,
        color: t.color,
        players: t.players || 0,
        roster: t.roster ? [...t.roster] : []
      }));
    }
    return newCat;
  });
}

function handleImportFile(input) {
  const file = input.files[0];
  if (!file) return;
  const preview = document.getElementById('imp-preview');
  preview.innerHTML = '<div style="color:var(--text-light);font-size:13px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><path d="M5 22h14M5 2h14M17 22v-4.172a2 2 0 0 0-.586-1.414L12 12l-4.414 4.414A2 2 0 0 0 7 17.828V22M7 2v4.172a2 2 0 0 0 .586 1.414L12 12l4.414-4.414A2 2 0 0 0 17 6.172V2"/></svg> Analizando archivo...</div>';
  document.getElementById('imp-confirm-btn').style.display = 'none';
  _importedCategories = null;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const wb   = XLSX.read(data, {type: 'array'});
      _importedCategories = _parseExcelTournament(wb);

      if (!_importedCategories.length) {
        preview.innerHTML = '<div style="color:#e74c3c;font-size:13px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> No se encontraron partidos en el archivo.</div>';
        return;
      }

      let html = '<div style="background:#f0fdf4;border:1.5px solid #16a34a;border-radius:8px;padding:12px 14px">';
      html += '<div style="font-weight:800;font-size:13px;color:#14532d;margin-bottom:8px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg> Detectado:</div>';
      let totalTeams = 0, totalMatches = 0;
      _importedCategories.forEach(cat => {
        const tm = cat.teams.length;
        const ma = cat.groups.reduce((s,g) => s + g.rounds.reduce((s2,r) => s2 + r.matches.length, 0), 0);
        totalTeams += tm; totalMatches += ma;
        html += `<div style="display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid #dcfce7">
          <span style="font-weight:700">${escHtml(cat.name)}</span>
          <span style="color:#64748b">${cat.groups.length} grupo${cat.groups.length!==1?'s':''} · ${tm} equipos · ${ma} partidos</span>
        </div>`;
      });
      html += `<div style="font-size:12px;font-weight:700;color:#14532d;padding-top:7px">
        Total: ${_importedCategories.length} categorías · ${totalTeams} equipos · ${totalMatches} partidos
      </div>`;
      html += '</div>';
      preview.innerHTML = html;
      document.getElementById('imp-confirm-btn').style.display = 'block';
    } catch(err) {
      preview.innerHTML = `<div style="color:#e74c3c;font-size:13px;padding:10px;background:#fef2f2;border-radius:6px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> Error al leer el archivo: ${escHtml(err.message)}</div>`;
    }
  };
  reader.readAsArrayBuffer(file);
}

function _parseExcelTournament(wb) {
  // Column indices matching the CSC Chicureo format:
  // 0:Horario 1:Gana1 2:Equipo1 3:Goles1 4:Empate 5:Goles2 6:Equipo2 7:Gana2 8:Cancha
  const TEAM_COLORS = [
    '#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c','#3498db',
    '#9b59b6','#e91e63','#795548','#607d8b','#16a085','#d35400',
    '#c0392b','#2980b9','#27ae60','#8e44ad','#f39c12','#1e88e5'
  ];
  let colorIdx = 0;
  const categories = [];

  for (const sheetName of wb.SheetNames) {
    const ws   = wb.Sheets[sheetName];
    const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null, raw:false});
    if (rows.length < 2) continue;

    // Parse match rows (row 0 = header, skip it)
    const matchData = [];
    for (let i = 1; i < rows.length; i++) {
      const row = rows[i];
      const team1  = row[2] ? String(row[2]).trim() : null;
      const team2  = row[6] ? String(row[6]).trim() : null;
      const score1 = parseInt(row[3]);
      const score2 = parseInt(row[5]);
      if (!team1 || !team2) continue;
      if (isNaN(score1) || isNaN(score2)) continue;
      matchData.push({team1, score1, team2, score2});
    }
    if (!matchData.length) continue;

    // All unique team names
    const teamNames = [...new Set([...matchData.map(m=>m.team1), ...matchData.map(m=>m.team2)])];

    // Build adjacency graph: edge = "played each other"
    const adj = {};
    teamNames.forEach(t => { adj[t] = new Set(); });
    matchData.forEach(m => { adj[m.team1].add(m.team2); adj[m.team2].add(m.team1); });

    // BFS to find connected components = groups
    const visited  = new Set();
    const groupSets = [];
    for (const team of teamNames) {
      if (visited.has(team)) continue;
      const component = [];
      const queue = [team];
      while (queue.length) {
        const t = queue.shift();
        if (visited.has(t)) continue;
        visited.add(t); component.push(t);
        for (const nb of adj[t]) { if (!visited.has(nb)) queue.push(nb); }
      }
      groupSets.push(component);
    }

    // Create team objects
    const teamObjs = {};
    teamNames.forEach(name => {
      teamObjs[name] = {
        id: uuid(), name,
        color: TEAM_COLORS[colorIdx++ % TEAM_COLORS.length],
        players: 0, roster: []
      };
    });

    // Create group objects (one round per group, all matches inside)
    const groupObjs = groupSets.map((groupTeams, gi) => {
      const teamIds = groupTeams.map(n => teamObjs[n].id);
      const groupMatches = matchData
        .filter(m => groupTeams.includes(m.team1) && groupTeams.includes(m.team2))
        .map(m => ({
          id: uuid(),
          team1Id: teamObjs[m.team1].id,
          team2Id: teamObjs[m.team2].id,
          score1:  m.score1,
          score2:  m.score2,
          played:  true,
          scorers: []
        }));
      return {
        id:      uuid(),
        name:    'Grupo ' + String.fromCharCode(65 + gi),
        cancha:  String(gi + 1),
        teamIds,
        rounds:  [{id: uuid(), name: 'Fase de grupos', matches: groupMatches}]
      };
    });

    categories.push({
      id:               uuid(),
      name:             sheetName,
      teams:            Object.values(teamObjs),
      groups:           groupObjs,
      fixtureGenerated: true,
      fixtureConfig:    {courts: groupObjs.length, startTime: '8:30'}
    });
  }
  return categories;
}

function confirmImport() {
  const name    = document.getElementById('imp-tour-name')?.value.trim();
  const color   = document.getElementById('imp-tour-color')?.value || '#0093d8';
  const rawDate = document.getElementById('imp-tour-date')?.value || '';
  const date    = _formatTourDate(rawDate);

  if (!name) { alert('Selecciona la copa del torneo antes de importar'); return; }
  if (!_importedCategories || !_importedCategories.length) { alert('No hay datos para importar'); return; }

  const tour = {
    id:         uuid(),
    name,
    color,
    date,
    categories: _importedCategories,
    status:     'finished'
  };
  state.tournaments.push(tour);
  _importedCategories = null;
  saveState();
  closeModal();
  enterTournament(tour.id);
}

function _dateToIso(displayDate) {
  // Convierte "15 Jun 2025" → "2025-06-15" para el date picker
  if (!displayDate) return '';
  const months = {Ene:'01',Feb:'02',Mar:'03',Abr:'04',May:'05',Jun:'06',Jul:'07',Ago:'08',Sep:'09',Oct:'10',Nov:'11',Dic:'12'};
  const parts = displayDate.split(' ');
  if (parts.length !== 3) return '';
  const d = parts[0].padStart(2,'0'), m = months[parts[1]], y = parts[2];
  return m ? `${y}-${m}-${d}` : '';
}

function saveTournament(tourId) {
  const tour = getTournamentById(tourId);
  if (!tour) return;
  const name = document.getElementById('edit-tour-name')?.value.trim();
  const rawDate = document.getElementById('edit-tour-date')?.value || '';
  const date = _formatTourDate(rawDate);
  if (name) tour.name = name;
  tour.date = date;
  saveState(); closeModal(); renderPage();
}
function setTournamentStatus(tourId, status) {
  const tour = getTournamentById(tourId);
  if (!tour) return;
  tour.status = status;
  saveState(); closeModal(); renderPage();
}

function deleteTournament(tourId) {
  if (!confirm('¿Eliminar este torneo y todos sus datos?')) return;
  state.tournaments = state.tournaments.filter(t => t.id !== tourId);
  if (state.activeTournamentId === tourId) {
    state.activeTournamentId = state.tournaments[0]?.id || null;
    state.activeCategoryId = null;
  }
  saveState(); closeModal(); renderPage();
}

function selectCategory(id) {
  state.activeCategoryId = id;
  saveState();
  renderHeader();
  renderPage();
}

/* ═══════════════════════ EXPORTAR GLOBAL ═══════════════════════ */
function generateGlobalXLSX(copaKey, tipo) {
  const COPAS = {
    csc:      { label: 'Copa Super Campeones',         filter: n => /super campeones/i.test(n) && !/2\b|ii\b|chicureo/i.test(n) },
    csc2:     { label: 'Copa Super Campeones 2',        filter: n => /super campeones\s*(2|ii)\b/i.test(n) },
    chicureo: { label: 'Copa Super Campeones Chicureo', filter: n => /chicureo/i.test(n) },
  };
  const copa = COPAS[copaKey];
  if (!copa) return;

  const tours = (state.tournaments || []).filter(t => copa.filter(t.name || ''));
  if (!tours.length) { showToast('Sin torneos para ' + copa.label); return; }

  const wb = XLSX.utils.book_new();
  const catNames = [...new Set(tours.flatMap(t => (t.categories || []).map(c => c.name || 'Sin nombre')))].sort();
  const tourList = tours.map(t => t.name).join(' | ');

  for (const catName of catNames) {
    const standingsMap = {};
    const scorersMap   = {};

    for (const tour of tours) {
      for (const cat of (tour.categories || []).filter(c => (c.name || '') === catName)) {
        for (const g of (cat.groups || [])) {
          for (const s of calculateGroupStandings(g, cat)) {
            const k = s.name.toLowerCase().trim();
            if (!standingsMap[k]) standingsMap[k] = { name: s.name, PJ:0, PG:0, PE:0, PP:0, GF:0, GC:0, DG:0, PTS:0, ESP:0 };
            standingsMap[k].PJ  += s.PJ;  standingsMap[k].PG  += s.PG;
            standingsMap[k].PE  += s.PE;  standingsMap[k].PP  += s.PP;
            standingsMap[k].GF  += s.GF;  standingsMap[k].GC  += s.GC;
            standingsMap[k].PTS += s.PTS; standingsMap[k].ESP += (s.ESP || 0);
          }
        }
        for (const s of buildScorersTable(cat)) {
          const team = (cat.teams || []).find(t => t.id === s.teamId);
          const teamName = team ? team.name : '?';
          const k = s.playerName + '||' + teamName;
          if (!scorersMap[k]) scorersMap[k] = { player: s.playerName, team: teamName, goals: 0 };
          scorersMap[k].goals += s.goals;
        }
      }
    }

    if (!Object.keys(standingsMap).length && !Object.keys(scorersMap).length) continue;

    Object.values(standingsMap).forEach(s => { s.DG = s.GF - s.GC; });
    const standings = Object.values(standingsMap).sort((a,b) => b.PTS-a.PTS || b.DG-a.DG || b.GF-a.GF || a.name.localeCompare(b.name));
    const scorers   = Object.values(scorersMap).sort((a,b) => b.goals-a.goals || a.player.localeCompare(b.player));
    const espiritu  = [...standings].filter(s => s.ESP > 0).sort((a,b) => b.ESP-a.ESP);

    const sn      = (catName || 'Cat').slice(0, 22);
    const header1 = [`${copa.label} — ${catName} — Acumulado todas las fechas`];
    const header2 = [`Fechas: ${tourList}`];

    if (tipo === 'posiciones') {
      const rows = [header1, header2, [], ['Pos','Equipo','PJ','PG','PE','PP','GF','GC','DG','PTS'],
        ...standings.map((s,i) => [i+1, s.name, s.PJ, s.PG, s.PE, s.PP, s.GF, s.GC, s.DG, s.PTS])];
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), sn.slice(0,28));
    } else if (tipo === 'goleadores') {
      const rows = [header1, header2, [], ['Pos','Jugador','Equipo','Goles'],
        ...scorers.map((s,i) => [i+1, s.player, s.team, s.goals])];
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), sn.slice(0,28));
    } else if (tipo === 'espiritu') {
      const rows = [header1, header2, [], ['Pos','Equipo','Premios Espíritu SC'],
        ...(espiritu.length ? espiritu.map((e,i) => [i+1, e.name, e.ESP]) : [['—','Sin datos aún',0]])];
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), sn.slice(0,28));
    }
  }

  if (!wb.SheetNames.length) { showToast('Sin datos para exportar'); return; }

  const slug = copaKey === 'chicureo' ? 'chicureo' : copaKey === 'csc2' ? 'csc2' : 'csc';
  const tipoSlug = tipo === 'posiciones' ? 'posiciones' : tipo === 'goleadores' ? 'goleadores' : 'espiritu';
  XLSX.writeFile(wb, `global-${slug}-${tipoSlug}-${new Date().toISOString().slice(0,10)}.xlsx`);
  showToast('<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg> Excel descargado');
}

function generateTourCompleteXLSX(tourId) {
  const tour = state.tournaments.find(t => t.id === tourId);
  if (!tour) return;
  const wb = XLSX.utils.book_new();

  for (const cat of (tour.categories || [])) {
    const catName = (cat.name || 'Cat').slice(0, 20);

    // ── Hoja: Resultados ──
    const resRows = [];
    resRows.push([tour.name, '', '', '', cat.name, '', '', tour.date || '']);
    resRows.push([]);
    resRows.push(['RESULTADOS', '', '', '', '', '', '', '']);
    resRows.push(['Categoría', 'Cancha', 'Equipo Local', '', 'Equipo Visitante', 'Resultado', 'Horario', 'Estado']);
    for (const g of (cat.groups || [])) {
      const cancha = g.cancha ? `Cancha ${g.cancha}` : g.name;
      const st = cat.fixtureConfig?.startTime;
      (g.rounds || []).forEach((round, ri) => {
        (round.matches || []).forEach((m, mi) => {
          const t1 = (cat.teams || []).find(t => t.id === m.team1Id);
          const t2 = (cat.teams || []).find(t => t.id === m.team2Id);
          const mins = (() => { if (!st) return null; const [h,mn]=st.split(':').map(Number); return h*60+mn+(ri*2+mi)*30; })();
          const time = mins !== null ? `${String(Math.floor(mins/60)).padStart(2,'0')}:${String(mins%60).padStart(2,'0')}` : '';
          resRows.push([
            cat.name, cancha,
            t1?.name || '?', 'vs', t2?.name || '?',
            m.played ? `${m.score1} - ${m.score2}` : '-',
            time,
            m.played ? 'Jugado' : 'Pendiente'
          ]);
        });
      });
      resRows.push([]);
    }

    // ── Hoja: Posiciones ──
    const posRows = [];
    posRows.push([tour.name, '', '', '', cat.name]);
    posRows.push([]);
    posRows.push(['POSICIONES', '', '', '', '', '', '', '']);
    for (const g of (cat.groups || [])) {
      const cancha = g.cancha ? `Cancha ${g.cancha}` : g.name;
      posRows.push([cancha]);
      posRows.push(['Pos', 'Equipo', 'PJ', 'PG', 'PE', 'PP', 'GF', 'GC', 'DG', 'PTS']);
      const standings = calculateGroupStandings(g, cat);
      standings.forEach((s, i) => {
        posRows.push([i + 1, s.name, s.PJ, s.PG, s.PE, s.PP, s.GF, s.GC, s.DG, s.PTS]);
      });
      posRows.push([]);
    }

    // ── Hoja: Goleadores ──
    const golRows = [];
    golRows.push([tour.name, '', cat.name]);
    golRows.push([]);
    golRows.push(['GOLEADORES']);
    golRows.push(['Pos', 'Jugador', 'Equipo', 'Goles']);
    const scorers = buildScorersTable(cat);
    if (scorers.length === 0) {
      golRows.push(['', 'Sin goles registrados']);
    } else {
      scorers.forEach((s, i) => {
        const team = (cat.teams || []).find(t => t.id === s.teamId);
        golRows.push([i + 1, s.playerName, team?.name || '?', s.goals]);
      });
    }

    // Agregar hojas al workbook
    const wsRes = XLSX.utils.aoa_to_sheet(resRows);
    wsRes['!cols'] = [{wch:14},{wch:12},{wch:22},{wch:4},{wch:22},{wch:10},{wch:8},{wch:10}];
    XLSX.utils.book_append_sheet(wb, wsRes, `${catName} - Resultados`);

    const wsPos = XLSX.utils.aoa_to_sheet(posRows);
    wsPos['!cols'] = [{wch:5},{wch:22},{wch:4},{wch:4},{wch:4},{wch:4},{wch:5},{wch:5},{wch:5},{wch:5}];
    XLSX.utils.book_append_sheet(wb, wsPos, `${catName} - Posiciones`);

    const wsGol = XLSX.utils.aoa_to_sheet(golRows);
    wsGol['!cols'] = [{wch:5},{wch:24},{wch:22},{wch:7}];
    XLSX.utils.book_append_sheet(wb, wsGol, `${catName} - Goleadores`);
  }

  const filename = `${(tour.name||'torneo').replace(/\s+/g,'-').toLowerCase()}-completo.xlsx`;
  XLSX.writeFile(wb, filename);
  showToast('<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg> Excel descargado');
}

function _buildAdminHistory() {
  const entries = [];
  for (const tour of (state.tournaments || [])) {
    for (const cat of (tour.categories || [])) {
      // Grupos
      for (const g of (cat.groups || [])) {
        for (const r of (g.rounds || [])) {
          for (const m of (r.matches || [])) {
            if (!m.played) continue;
            const t1 = (cat.teams || []).find(t => t.id === m.team1Id);
            const t2 = (cat.teams || []).find(t => t.id === m.team2Id);
            entries.push({
              editedBy: m.editedBy || 'Admin',
              editedAt: m.editedAt || null,
              score:    `${m.score1}–${m.score2}`,
              teams:    `${t1?.name||'?'} vs ${t2?.name||'?'}`,
              tourName: tour.name,
              catName:  cat.name,
              context:  g.cancha ? `Cancha ${g.cancha}` : (g.name || ''),
            });
          }
        }
      }
      // Eliminatoria
      for (const round of (cat.knockout?.rounds || [])) {
        for (const m of (round.matches || [])) {
          if (!m.played) continue;
          const t1 = (cat.teams || []).find(t => t.id === m.team1Id);
          const t2 = (cat.teams || []).find(t => t.id === m.team2Id);
          entries.push({
            editedBy: m.editedBy || 'Admin',
            editedAt: m.editedAt || null,
            score:    `${m.score1}–${m.score2}`,
            teams:    `${t1?.name||'?'} vs ${t2?.name||'?'}`,
            tourName: tour.name,
            catName:  cat.name,
            context:  round.name || 'Eliminatoria',
          });
        }
      }
    }
  }

  if (!entries.length) {
    return `<div style="text-align:center;padding:16px 0;font-size:13px;color:var(--text-light)">Aún no hay partidos cargados.</div>`;
  }

  entries.sort((a, b) => {
    if (!a.editedAt && !b.editedAt) return 0;
    if (!a.editedAt) return 1;
    if (!b.editedAt) return -1;
    return new Date(b.editedAt) - new Date(a.editedAt);
  });

  const colors = ['#16a34a','#2563eb','#d97706','#dc2626','#7c3aed','#0891b2'];
  const colorFor = name => colors[Math.abs([...name].reduce((h,c)=>h+c.charCodeAt(0),0)) % colors.length];

  return entries.slice(0, 50).map(e => {
    const initial = e.editedBy.charAt(0).toUpperCase();
    const color   = colorFor(e.editedBy);
    return `
    <div style="display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
      <div style="width:32px;height:32px;border-radius:50%;background:${color};color:white;
        display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;flex-shrink:0">
        ${initial}
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:800;margin-bottom:2px">
          ${escHtml(e.editedBy)}
          <span style="font-weight:400;color:var(--text-light)"> · </span>
          <span style="font-weight:900;color:var(--green-dark)">${escHtml(e.score)}</span>
        </div>
        <div style="font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
          ${escHtml(e.teams)}
        </div>
        <div style="font-size:11px;color:var(--text-light);margin-top:2px">
          ${escHtml(e.tourName)} · ${escHtml(e.catName)}${e.context ? ' · ' + escHtml(e.context) : ''}
        </div>
      </div>
      <div style="font-size:11px;color:var(--text-light);white-space:nowrap;flex-shrink:0;padding-top:2px">
        ${e.editedAt ? _timeAgo(e.editedAt) : '—'}
      </div>
    </div>`;
  }).join('');
}

/* ══════════════════ ADMIN DASHBOARD HELPERS ══════════════════ */

function _adminMatchMins(cat, ri, mi) {
  const st = cat.fixtureConfig?.startTime;
  if (!st) return null;
  const [h, m] = st.split(':').map(Number);
  return h * 60 + m + (ri * 2 + mi) * 30;
}
function _adminMinsToStr(mins) {
  if (mins === null || mins === undefined) return null;
  return `${String(Math.floor(mins/60)).padStart(2,'0')}:${String(mins%60).padStart(2,'0')}`;
}
function _adminNowMins() {
  const now = new Date();
  return now.getHours() * 60 + now.getMinutes();
}

function _buildAdminDashboard() {
  const activeTours = state.tournaments.filter(t => _getTourStatus(t) === 'active');
  let html = '';
  for (const tour of activeTours) {
    let tourTotal = 0, tourPlayed = 0;
    const catBars = [];
    for (const cat of (tour.categories || [])) {
      if (!cat.fixtureGenerated) continue;
      let ct = 0, cp = 0;
      for (const g of (cat.groups||[])) for (const r of g.rounds) for (const m of r.matches) { ct++; tourTotal++; if (m.played) { cp++; tourPlayed++; } }
      for (const r of (cat.knockout?.rounds||[])) for (const m of r.matches) { if (!m.team1Id||!m.team2Id) continue; ct++; tourTotal++; if (m.played) { cp++; tourPlayed++; } }
      if (ct > 0) catBars.push({ name: cat.name, played: cp, total: ct });
    }
    if (!tourTotal) continue;
    const tp = Math.round((tourPlayed/tourTotal)*100);
    const tourColor = tp===100?'#22c55e':tp>=60?'var(--green)':tp>=30?'#f59e0b':'#f87171';
    html += `
      <div style="margin-bottom:${activeTours.length>1?'20px':'0'}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
          <span style="font-size:13px;font-weight:800;color:var(--green-dark)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg> ${escHtml(tour.name)}</span>
          <span style="font-size:12px;font-weight:900;color:${tourColor}">${tourPlayed}/${tourTotal} · ${tp}%</span>
        </div>
        <div style="height:10px;background:var(--gray-light);border-radius:99px;overflow:hidden;margin-bottom:12px">
          <div style="height:100%;width:${tp}%;background:${tourColor};border-radius:99px;transition:width 0.4s"></div>
        </div>
        ${catBars.map(c => {
          const pct = Math.round((c.played/c.total)*100);
          const col = pct===100?'#22c55e':pct>=60?'var(--green)':pct>=30?'#f59e0b':'#f87171';
          return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <span style="font-size:12px;font-weight:600;color:var(--text-light);width:80px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${escHtml(c.name)}">${escHtml(c.name)}</span>
            <div style="flex:1;height:7px;background:var(--gray-light);border-radius:99px;overflow:hidden">
              <div style="height:100%;width:${pct}%;background:${col};border-radius:99px"></div>
            </div>
            <span style="font-size:11px;font-weight:800;color:${col};width:48px;text-align:right;flex-shrink:0">${c.played}/${c.total}</span>
          </div>`;
        }).join('')}
      </div>`;
  }
  return html || `<div style="text-align:center;padding:16px;font-size:13px;color:var(--text-light)">No hay torneos activos.</div>`;
}

function _buildAdminDelayAlerts() {
  const nowMins = _adminNowMins();
  const alerts = [];
  for (const tour of state.tournaments) {
    if (_getTourStatus(tour) !== 'active') continue;
    for (const cat of (tour.categories||[])) {
      if (!cat.fixtureGenerated || !cat.fixtureConfig?.startTime) continue;
      for (const g of (cat.groups||[])) {
        (g.rounds||[]).forEach((round, ri) => {
          (round.matches||[]).forEach((match, mi) => {
            if (match.played) return;
            const mins = _adminMatchMins(cat, ri, mi);
            if (mins === null || nowMins <= mins + 30) return;
            const t1 = (cat.teams||[]).find(t => t.id === match.team1Id);
            const t2 = (cat.teams||[]).find(t => t.id === match.team2Id);
            alerts.push({
              timeStr: _adminMinsToStr(mins),
              delayMins: nowMins - mins,
              teams: `${t1?.name||'?'} vs ${t2?.name||'?'}`,
              cancha: g.cancha ? `Cancha ${g.cancha}` : g.name,
              catName: cat.name,
            });
          });
        });
      }
    }
  }
  if (!alerts.length) return `
    <div style="display:flex;align-items:center;gap:10px;padding:12px 14px;
      background:#f0fdf4;border-radius:10px;border:1.5px solid #86efac;
      font-size:13px;color:#166534;font-weight:700">
      <span style="font-size:1.2rem"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg></span> Sin demoras — todos los partidos al día
    </div>`;
  alerts.sort((a,b) => b.delayMins - a.delayMins);
  return alerts.map(a => `
    <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;
      background:#fef2f2;border-radius:10px;border:1.5px solid #fca5a5;margin-bottom:8px">
      <span style="font-size:1.2rem;flex-shrink:0"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:800;color:#991b1b">${escHtml(a.teams)}</div>
        <div style="font-size:11px;color:#b91c1c;margin-top:2px">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> ${a.timeStr} · ${escHtml(a.cancha)} · ${escHtml(a.catName)}
        </div>
      </div>
      <div style="font-size:13px;font-weight:900;color:#dc2626;white-space:nowrap;flex-shrink:0">
        +${a.delayMins} min
      </div>
    </div>`).join('');
}

function _buildAdminCanchaStatus() {
  const nowMins = _adminNowMins();
  const canchaMap = {};
  for (const tour of state.tournaments) {
    if (_getTourStatus(tour) !== 'active') continue;
    for (const cat of (tour.categories||[])) {
      if (!cat.fixtureGenerated) continue;
      for (const g of (cat.groups||[])) {
        const key = g.cancha ? `Cancha ${g.cancha}` : g.name;
        if (!canchaMap[key]) canchaMap[key] = [];
        (g.rounds||[]).forEach((round, ri) => {
          (round.matches||[]).forEach((match, mi) => {
            const mins = _adminMatchMins(cat, ri, mi);
            const t1 = (cat.teams||[]).find(t => t.id === match.team1Id);
            const t2 = (cat.teams||[]).find(t => t.id === match.team2Id);
            canchaMap[key].push({ match, mins, timeStr: _adminMinsToStr(mins), teams: `${t1?.name||'?'} vs ${t2?.name||'?'}`, catName: cat.name });
          });
        });
      }
    }
  }
  const keys = Object.keys(canchaMap).sort((a,b) => {
    const na = parseInt(a.replace(/\D/g,'')), nb = parseInt(b.replace(/\D/g,''));
    return (!isNaN(na)&&!isNaN(nb)) ? na-nb : a.localeCompare(b);
  });
  if (!keys.length) return `<div style="text-align:center;padding:16px;font-size:13px;color:var(--text-light)">Sin canchas asignadas en torneos activos.</div>`;

  return `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px">` +
    keys.map(key => {
      const items = canchaMap[key].sort((a,b)=>(a.mins??9999)-(b.mins??9999));
      const allDone = items.every(i=>i.match.played);
      const playedCount = items.filter(i=>i.match.played).length;
      const overdue  = items.filter(i=>!i.match.played && i.mins!==null && nowMins>i.mins);
      const upcoming = items.filter(i=>!i.match.played && (i.mins===null || nowMins<=i.mins));
      const lastPlayed = [...items].filter(i=>i.match.played).pop() || null;
      const currentItem = overdue.length ? overdue[overdue.length-1] : lastPlayed;
      const nextItem = upcoming[0] || null;
      const isOverdue = overdue.length > 0;
      const borderColor = allDone?'#86efac':isOverdue?'#fca5a5':'var(--border)';
      const bgColor     = allDone?'#f0fdf4':isOverdue?'#fff5f5':'white';
      return `
        <div class="card" style="padding:14px;box-shadow:0 1px 6px rgba(0,0,0,0.06);border:1.5px solid ${borderColor};background:${bgColor}">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
            <span style="font-size:13px;font-weight:900;color:var(--green-dark)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg> ${escHtml(key)}</span>
            <span style="font-size:10px;font-weight:800;color:var(--text-light);background:var(--gray-light);padding:2px 7px;border-radius:20px">${playedCount}/${items.length}</span>
          </div>
          ${allDone
            ? `<div style="font-size:12px;color:#166534;font-weight:700"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg> Todos finalizados</div>`
            : `${currentItem ? `<div style="margin-bottom:${nextItem?'10px':'0'};padding-bottom:${nextItem?'10px':'0'};border-bottom:${nextItem?'1px solid var(--border)':'none'}">
                <div style="font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:0.6px;color:${currentItem.match.played?'#16a34a':'#dc2626'};margin-bottom:3px">${currentItem.match.played?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg> Último jugado':'<svg width="10" height="10" viewBox="0 0 10 10" style="vertical-align:middle;flex-shrink:0"><circle cx="5" cy="5" r="4" fill="#ef4444"/></svg> En demora'}</div>
                <div style="font-size:12px;font-weight:700;line-height:1.3">${escHtml(currentItem.teams)}</div>
                ${currentItem.timeStr?`<div style="font-size:11px;color:var(--text-light);margin-top:2px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> ${currentItem.timeStr} · ${escHtml(currentItem.catName)}</div>`:''}
              </div>` : ''}
            ${nextItem ? `<div>
                <div style="font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-light);margin-bottom:3px">Próximo</div>
                <div style="font-size:12px;font-weight:700;line-height:1.3">${escHtml(nextItem.teams)}</div>
                ${nextItem.timeStr?`<div style="font-size:11px;color:var(--text-light);margin-top:2px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> ${nextItem.timeStr} · ${escHtml(nextItem.catName)}</div>`:''}
              </div>` : ''}`
          }
        </div>`;
    }).join('') + `</div>`;
}

function _buildAdminPlanilleroActivity() {
  const planilleros = _getPlanilleros();
  if (!planilleros.length) return `<div style="text-align:center;padding:12px;font-size:13px;color:var(--text-light)">Sin planilleros registrados.</div>`;
  const actMap = {};
  for (const p of planilleros) actMap[p.name] = { count:0, lastAt:null };
  for (const tour of state.tournaments) {
    for (const cat of (tour.categories||[])) {
      const check = m => {
        if (!m.played||!m.editedBy||!actMap[m.editedBy]) return;
        actMap[m.editedBy].count++;
        if (!actMap[m.editedBy].lastAt || m.editedAt > actMap[m.editedBy].lastAt) actMap[m.editedBy].lastAt = m.editedAt;
      };
      for (const g of (cat.groups||[])) for (const r of g.rounds) for (const m of r.matches) check(m);
      for (const r of (cat.knockout?.rounds||[])) for (const m of r.matches) check(m);
    }
  }
  const sorted = [...planilleros].sort((a,b)=>(actMap[b.name]?.count||0)-(actMap[a.name]?.count||0));
  return sorted.map(p => {
    const act = actMap[p.name];
    const active = act.count > 0;
    return `
      <div style="display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)">
        <div style="width:38px;height:38px;border-radius:50%;
          background:${active?'var(--green)':'var(--gray-light)'};
          color:${active?'white':'var(--text-light)'};
          display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;flex-shrink:0">
          ${escHtml(p.name.charAt(0).toUpperCase())}
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:800;font-size:14px">${escHtml(p.name)}</div>
          <div style="font-size:12px;color:var(--text-light);margin-top:2px">
            ${active ? `Última carga: ${_timeAgo(act.lastAt)}` : 'Sin actividad aún'}
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:26px;font-weight:900;line-height:1;color:${active?'var(--green-dark)':'var(--gray)'}">${act.count}</div>
          <div style="font-size:10px;color:var(--text-light);font-weight:700;text-transform:uppercase;letter-spacing:0.5px">partidos</div>
        </div>
      </div>`;
  }).join('');
}

async function _adminAddPlanillero() {
  const name  = document.getElementById('adm-new-name')?.value.trim();
  const pwd   = document.getElementById('adm-new-pwd')?.value;
  const pwd2  = document.getElementById('adm-new-pwd2')?.value;
  const errEl = document.getElementById('adm-new-error');
  const setErr = msg => { if (errEl) errEl.textContent = msg; };
  if (!name)         { setErr('Ingresá un nombre de usuario'); document.getElementById('adm-new-name')?.focus(); return; }
  if (!pwd)          { setErr('Ingresá una contraseña'); document.getElementById('adm-new-pwd')?.focus(); return; }
  if (pwd.length < 4){ setErr('Mínimo 4 caracteres'); return; }
  if (pwd !== pwd2)  { setErr('Las contraseñas no coinciden'); document.getElementById('adm-new-pwd2')?.focus(); return; }
  const list = _getPlanilleros();
  if (list.find(p => p.name.toLowerCase() === name.toLowerCase())) {
    setErr('Ya existe un planillero con ese usuario'); return;
  }
  const salt = _genSalt();
  list.push({ id: 'pl_' + Date.now(), name, hash: await _sha256salted(pwd, salt), salt, v: 'sha256s' });
  _savePlanilleros(list);
  document.getElementById('adm-new-name').value  = '';
  document.getElementById('adm-new-pwd').value   = '';
  document.getElementById('adm-new-pwd2').value  = '';
  if (errEl) errEl.textContent = '';
  document.getElementById('adm-new-name')?.focus();
  document.getElementById('admin-plan-list').innerHTML = _renderAdminPlanilleroList();
  showToast(`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg> ${name} creado`);
}

function _adminDeletePlanillero(id) {
  const list = _getPlanilleros();
  const p = list.find(x => x.id === id);
  if (!p) return;
  if (!confirm(`¿Eliminar a "${p.name}"?`)) return;
  _savePlanilleros(list.filter(x => x.id !== id));
  document.getElementById('admin-plan-list').innerHTML = _renderAdminPlanilleroList();
  showToast('Planillero eliminado');
}

function _adminEditPlanillero(id) {
  const list = _getPlanilleros();
  const p = list.find(x => x.id === id);
  if (!p) return;
  // Reemplazar la fila con un mini-formulario inline
  const row = document.getElementById(`adm-row-${id}`);
  if (!row) return;
  row.innerHTML = `
    <div style="flex:1;display:flex;flex-direction:column;gap:8px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div>
          <label class="input-label" style="font-size:10px">Nombre</label>
          <input id="adm-edit-name-${id}" class="input" value="${escHtml(p.name)}" style="font-size:13px;padding:8px 10px">
        </div>
        <div>
          <label class="input-label" style="font-size:10px">Nueva contraseña</label>
          <input id="adm-edit-pwd-${id}" class="input" placeholder="(sin cambios)" style="font-size:13px;padding:8px 10px">
        </div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" onclick="_adminSaveEdit('${id}')" style="flex:1;font-size:13px;padding:8px">Guardar</button>
        <button class="btn btn-secondary" onclick="document.getElementById('admin-plan-list').innerHTML=_renderAdminPlanilleroList()"
          style="font-size:13px;padding:8px 14px">Cancelar</button>
      </div>

  document.getElementById(`adm-edit-name-${id}`)?.focus();
}

async function _adminSaveEdit(id) {
  const name = document.getElementById(`adm-edit-name-${id}`)?.value.trim();
  const pwd  = document.getElementById(`adm-edit-pwd-${id}`)?.value.trim();
  if (!name) { showToast('El nombre no puede estar vacío'); return; }
  const list = _getPlanilleros();
  const idx  = list.findIndex(p => p.id === id);
  if (idx === -1) return;
  const dup = list.find(p => p.name.toLowerCase() === name.toLowerCase() && p.id !== id);
  if (dup) { showToast('Ya existe un planillero con ese nombre'); return; }
  list[idx].name = name;
  if (pwd) {
    const salt = _genSalt();
    list[idx].hash = await _sha256salted(pwd, salt);
    list[idx].salt = salt;
    list[idx].v = 'sha256s';
    delete list[idx].password;
  }
  _savePlanilleros(list);
  document.getElementById('admin-plan-list').innerHTML = _renderAdminPlanilleroList();
  showToast('<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg> Cambios guardados');
}

/* ── Export / Import / Clear ── */
function _adminExportData() {
  const data = { state: JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'),
                 planilleros: _getPlanilleros(),
                 exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `supercampeones-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  showToast('<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg> Backup descargado');
}

function _adminImportData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.state) { showToast('Archivo inválido'); return; }
      if (!confirm('¿Reemplazar todos los datos actuales con este backup?')) return;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data.state));
      if (data.planilleros) _savePlanilleros(data.planilleros);
      loadState();
      renderPage();
      showToast('<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg> Datos importados');
    } catch { showToast('Error al leer el archivo'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function _adminClearData() {
  if (!confirm('<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex-shrink:0"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> ¿Borrar TODOS los torneos, categorías y equipos?\nEsta acción no se puede deshacer.')) return;
  if (!confirm('Confirmación final: ¿seguro que querés borrar todo?')) return;
  localStorage.removeItem(STORAGE_KEY);
  loadState();
  renderPage();
  showToast('Datos borrados');
}

/* ─────────────────────────────────────────────────── */
function renderPage() {
  // Sin rol → auto-ingresar como apoderado (lectura gratuita)
  if (!currentRole) {
    _setRole('apoderado', null);
  }
  _updateNavByRole();
  if (currentPage === 'hub') {
    document.getElementById('main-content').innerHTML = renderHubPage();
    renderHeader();
    return;
  }
  // Panel admin: no necesita torneo activo
  if (currentPage === 'admin') {
    try {
      document.getElementById('main-content').innerHTML = renderAdminPage();
    } catch(e) {
      console.error('[SC] renderAdminPage error:', e);
      const stack = (e.stack||'').split('\n').slice(0,4).join('<br>');
      document.getElementById('main-content').innerHTML = `<div style="padding:24px;color:var(--red);font-size:12px"><b>Error panel admin:</b><br>${e.message}<br><br><small style="color:var(--text-light);word-break:break-all">${stack}</small></div>`;
    }
    renderHeader();
    return;
  }
  renderHeader();
  updateContextBar();
  const mc = document.getElementById('main-content');
  const tour = getActiveTournament();
  const cat = getActiveCategory();
  // Guard: without tournament or category, always go to equipos/hub
  if (!tour && currentPage !== 'equipos') {
    if (isAdmin() || isPlanillero()) redirectToEquipos(); else { currentPage='hub'; renderPage(); return; }
  } else if (!cat && currentPage !== 'equipos') {
    if (isAdmin() || isPlanillero()) redirectToEquipos(); else { currentPage='hub'; renderPage(); return; }
  }
  // Guard de páginas restringidas
  if ((currentPage === 'equipos' || currentPage === 'grupos') && !isAdmin()) {
    currentPage = 'fixture'; renderPage(); return;
  }
  if (currentPage === 'equipos') mc.innerHTML = renderEquipos();
  else if (currentPage === 'grupos') mc.innerHTML = renderGruposPage();
  else if (currentPage === 'fixture') mc.innerHTML = renderFixturePage();
  else if (currentPage === 'resultados') mc.innerHTML = renderResultadosPage();
  else if (currentPage === 'posiciones') mc.innerHTML = renderPosicionesPage();
  bindEvents();
}

    : `<div class="team-cards-grid">${teams.map(t => {
      const init = t.name.trim().split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
      const bg = `linear-gradient(135deg, ${t.color||'#16a34a'} 0%, ${t.color||'#22c55e'}cc 100%)`;
      return `
      <div class="team-card">
        <div class="team-card-top" style="background:${bg}">
          <div class="team-card-watermark">${init}</div>
